# config/screener_oi.yaml
# ------------------------------------------------------------
# scr_oi_binance — скринер Open Interest на Binance
#
# Основная идея: после «тихой базы» (флэт/снижение + спокойные объёмы)
# ловим импульс по OI + объёму, который подтверждается ценой.
#
# BUY (лонг):
#   1) В базе (base_minutes) цена во флэте или в снижении, и объёмы «тихие»
#   2) В триггере (trigger_minutes) OI растёт (контракты) >= buy_oi_rise_pct
#   3) OI$ (open_interest_value) подтверждает рост >= oi_value_confirm_pct
#   4) Объём «ожил» (по среднему и/или по пику свечи): buy_volume_mult / buy_volume_spike_mult
#   5) Цена растёт и подтверждает импульс:
#      - по классическому порогу buy_price_rise_pct
#      - и/или через ATR-нормализацию (если use_atr_normalization=true)
#   6) BUY дополнительно фильтруется по ликвидности, устойчивости OI и score
#   7) Funding отрицательный (если enable_funding=true)
#
# SELL (шорт):
#   1) В базе цена во флэте или в снижении, и объёмы «тихие»
#   2) Появляется слабость/разворот: падение цены + откат от локального максимума
#   3) OI падает (за 1 свечу или в окне) и объёмы затухают после всплеска
#   4) Funding положительный (если sell_enable_funding=true)
#
# Новые улучшения в этой версии:
#   - батч-загрузка candles / open_interest / funding по всем символам
#   - фильтр по ликвидности инструмента (min_base_quote_volume, min_oi_value)
#   - проверка устойчивости OI в trigger-окне:
#       * рост OI от первой до последней свечи
#       * контроль просадки OI от пика к последней свече
#   - ATR-нормализация движения цены
#   - итоговый score сигнала и минимальный порог качества
#
# Результат:
#   - Запись сигнала в таблицу signals (source/status выставляются кодом)
#   - График (цена + объём + OI) с точкой входа, SL/TP и funding в заголовке
#   - Отправка в Telegram (если включено)
#   - Ретеншн графиков: keep_plots_days (по умолчанию 2 дня)
# ------------------------------------------------------------

restart_interval_minutes: 1  # Интервал запуска раннера (мин). Каждые N минут выполняется новый прогон.

screeners:
  - name: scr_oi_binance  # Имя скринера (должно совпадать с registry/классом)
    enabled: true         # true — скринер включён; false — пропускается
    version: "0.2"        # Версия для логов/аудита (повышена из-за новой логики и ускорения)

    params:
      # ==========================================================
      # БАЗОВЫЕ НАСТРОЙКИ
      # ==========================================================
      exchange_id: 1       # ID биржи в БД (у тебя Binance = 1)

      # Таймфреймы:
      # - если указан intervals: ["5m","15m","1h"], скринер выполнится по каждому ТФ отдельно
      # - если intervals не задан, можно использовать interval: "5m"
      intervals: ["5m", "15m", "1h"]  # Список таймфреймов для прогона
#      interval: "5m"                     # Альтернатива: один таймфрейм (если intervals не задан)

      min_price: 0.0000001   # Минимальная цена (фильтр «пылинок» и мусорных символов)
      max_price: 1000        # Максимальная цена (фильтр аномально дорогих/нецелевых)

      max_symbols: 0         # 0 = без лимита; >0 = ограничить количество символов из БД
      signal_mode: "both"    # both | buy | sell (какие сигналы генерировать)

      # ==========================================================
      # ЛИКВИДНОСТЬ / КАЧЕСТВО СИГНАЛА (общие дефолты)
      # ==========================================================
      # Эти значения используются как дефолт, но ниже для каждого ТФ заданы свои overrides.
      min_base_quote_volume: 400000.0     # Минимальный median quote-volume базы
      min_oi_value: 2500000.0             # Минимальный OI$ на последней свече trigger
      buy_min_oi_last_rise_pct: 1.5       # Минимальный рост OI от первой до последней свечи trigger
      max_oi_drawdown_from_peak_pct: 1.0  # Не брать BUY, если OI заметно сдулся от пика
      min_signal_score: 58.0              # Минимальный итоговый score (0..100)

      # ==========================================================
      # НОРМАЛИЗАЦИЯ ДВИЖЕНИЯ ЦЕНЫ ЧЕРЕЗ ATR (общие дефолты)
      # ==========================================================
      # Зачем нужно:
      # - одинаковый % движения на разных монетах означает разную «силу» импульса
      # - ATR делает пороги сопоставимыми между BTC, ETH и шумными альтами
      use_atr_normalization: true
      atr_period: 14
      buy_price_rise_atr_mult: 0.8       # Мин. рост цены в trigger, выраженный в ATR
      buy_price_max_rise_atr_mult: 2.2   # Макс. допустимый рост цены в trigger, чтобы не ловить late-entry

      # ==========================================================
      # ОКНА АНАЛИЗА (общие дефолты; ориентир — 15m как базовый режим)
      # ==========================================================
      base_minutes: 360      # «База» (фон) в минутах
      trigger_minutes: 45    # «Триггер» в минутах

      # ==========================================================
      # ПЕР-ИНТЕРВАЛЬНЫЕ OVERRIDES (разные настройки для 5m/15m/1h)
      # ==========================================================
      # Практика:
      # - временные окна на старших ТФ увеличиваем по абсолютному времени
      # - пороги по ликвидности/OI делаем строже на старших ТФ
      # - ATR-ограничения слегка расширяем по мере роста ТФ
      per_interval_overrides:
        "5m":
          # ------------------------------------------------------
          # 5m — агрессивный режим: больше шума, поэтому фильтры строже
          # ------------------------------------------------------
          # Окна и «свежесть»
          base_minutes: 240           # 4 часа базы
          trigger_minutes: 20         # 20 минут триггера
          max_signal_age_minutes: 30  # Свежесть сигнала (мин): старше — не пишем/не шлём
          plot_lookback_bars: 220     # История на графике (в свечах)

          # Ликвидность / качество
          min_base_quote_volume: 250000.0
          min_oi_value: 1500000.0
          buy_min_oi_last_rise_pct: 1.2
          max_oi_drawdown_from_peak_pct: 0.8
          min_signal_score: 62.0

          # ATR-нормализация
          use_atr_normalization: true
          atr_period: 14
          buy_price_rise_atr_mult: 0.7
          buy_price_max_rise_atr_mult: 1.8

          # Поведение BUY
          buy_allow_downtrend_base: false
          buy_require_volume_spike: true
          buy_price_max_rise_pct: 3.5

          # Пороги BUY (5m) — быстрый, но уже достаточно строгий режим
          buy_oi_rise_pct: 2.5          # Рост OI (контракты) в trigger-окне, %
          oi_value_confirm_pct: 2.0     # Рост OI$ (USDT) в trigger-окне, %
          buy_volume_mult: 2.2          # Средний объём trigger >= median(base) * N
          buy_volume_spike_mult: 4.0    # Пик свечи trigger >= median(base) * N
          buy_price_rise_pct: 2.5       # Рост цены в trigger-окне (по «пику»), %
          buy_min_green_candles: 3      # Минимум зелёных свечей в trigger-окне
          buy_require_last_green: true  # Последняя свеча trigger-окна должна быть зелёной

          # Пороги SELL (5m)
          sell_oi_drop_one_candle_pct: 2.0 # Падение OI за 1 свечу, %
          sell_oi_drop_window_pct: 2.5     # Падение OI за trigger-окно, %
          sell_price_drop_last_pct: 1.0    # Падение цены на последней свече/в конце окна, %
          sell_reversal_from_max_pct: 1.1  # Откат от локального максимума в trigger-окне, %
          sell_volume_spike_mult: 2.3      # Пик объёма trigger >= median(base) * N
          sell_volume_drop_ratio: 0.65     # Затухание: объём в конце <= peak * ratio

        "15m":
          # ------------------------------------------------------
          # 15m — основной сбалансированный рабочий режим
          # ------------------------------------------------------
          # Окна и «свежесть»
          base_minutes: 360           # 6 часов базы
          trigger_minutes: 45         # 45 минут триггера
          max_signal_age_minutes: 60  # Для 15m логично дать больше времени на свежесть
          plot_lookback_bars: 180     # Меньше баров, чтобы держать сопоставимый горизонт по времени

          # Ликвидность / качество
          min_base_quote_volume: 400000.0
          min_oi_value: 2500000.0
          buy_min_oi_last_rise_pct: 1.5
          max_oi_drawdown_from_peak_pct: 1.0
          min_signal_score: 58.0

          # ATR-нормализация
          use_atr_normalization: true
          atr_period: 14
          buy_price_rise_atr_mult: 0.8
          buy_price_max_rise_atr_mult: 2.2

          # Поведение BUY
          buy_allow_downtrend_base: false
          buy_require_volume_spike: true
          buy_price_max_rise_pct: 4.0

          # Пороги BUY (15m)
          buy_oi_rise_pct: 2.8          # Немного строже, чем на 5m
          oi_value_confirm_pct: 2.2
          buy_volume_mult: 2.0
          buy_volume_spike_mult: 3.6
          buy_price_rise_pct: 2.8
          buy_min_green_candles: 2      # На 15m не надо требовать слишком много зелёных свечей
          buy_require_last_green: true

          # Пороги SELL (15m)
          sell_oi_drop_one_candle_pct: 2.2
          sell_oi_drop_window_pct: 2.8
          sell_price_drop_last_pct: 1.2
          sell_reversal_from_max_pct: 1.4
          sell_volume_spike_mult: 2.1
          sell_volume_drop_ratio: 0.68

        "1h":
          # ------------------------------------------------------
          # 1h — спокойный режим: сигналов меньше, но требования к качеству выше
          # ------------------------------------------------------
          # Окна и «свежесть»
          base_minutes: 720            # 12 часов базы
          trigger_minutes: 120         # 2 часа триггера
          max_signal_age_minutes: 180  # На 1h свежесть можно расширить
          plot_lookback_bars: 140      # Держим график читаемым без лишнего шума

          # Ликвидность / качество
          min_base_quote_volume: 800000.0
          min_oi_value: 5000000.0
          buy_min_oi_last_rise_pct: 2.0
          max_oi_drawdown_from_peak_pct: 1.2
          min_signal_score: 55.0

          # ATR-нормализация
          use_atr_normalization: true
          atr_period: 14
          buy_price_rise_atr_mult: 0.9
          buy_price_max_rise_atr_mult: 2.8

          # Поведение BUY
          buy_allow_downtrend_base: false
          buy_require_volume_spike: true
          buy_price_max_rise_pct: 5.0

          # Пороги BUY (1h)
          buy_oi_rise_pct: 3.2          # На 1h ждём более осмысленного роста OI
          oi_value_confirm_pct: 2.5
          buy_volume_mult: 1.8
          buy_volume_spike_mult: 3.2
          buy_price_rise_pct: 3.0
          buy_min_green_candles: 2
          buy_require_last_green: true

          # Пороги SELL (1h)
          sell_oi_drop_one_candle_pct: 2.5
          sell_oi_drop_window_pct: 3.0
          sell_price_drop_last_pct: 1.5
          sell_reversal_from_max_pct: 1.8
          sell_volume_spike_mult: 2.0
          sell_volume_drop_ratio: 0.70

      # ==========================================================
      # PRICE: критерии «базы» (фон)
      # ==========================================================
      # Эти параметры определяют «условия фона» за base_minutes:
      # - флэт (небольшой диапазон)
      # - или снижение (чтобы BUY ловил набор OI «после слабости»)
      price_sideways_max_pct: 7.0   # Флэт: range% цены в базе <= порога
      price_downtrend_min_pct: 0.3  # Снижение: падение цены в базе >= порога (%)

      # ==========================================================
      # VOLUME: «тихая база»
      # ==========================================================
      # Чтобы импульс был заметен, база по объёму должна быть без экстремальных всплесков:
      # max(volume_base) <= median(volume_base) * base_volume_max_mult
      base_volume_max_mult: 5.0     # Чем меньше — тем строже «тишина» базы

      # ==========================================================
      # BUY: свечные подтверждения (общие дефолты, но override может менять)
      # ==========================================================
      buy_min_green_candles: 3      # Минимум зелёных свечей в trigger-окне (если override не задан)
      buy_require_last_green: true  # Требовать, чтобы последняя свеча в trigger-окне была зелёной

      # ==========================================================
      # OI — какие колонки использовать (из БД)
      # ==========================================================
      # В public.open_interest:
      #   open_interest       — контракты
      #   open_interest_value — USDT
      #
      # Рекомендуется:
      # - расчёт условий по open_interest (контракты) — цена не «раздувает» метрику
      # - график по open_interest_value (USDT) — нагляднее notional
      oi_calc_key: "open_interest"        # OI для расчёта условий (BUY/SELL)
      oi_plot_key: "open_interest_value"  # OI для графика

      # ==========================================================
      # Funding filter (BUY)
      # ==========================================================
      enable_funding: true                   # Если true — BUY требует funding < buy_funding_max_pct
      buy_funding_max_pct: -0.0001           # BUY: funding должен быть ниже порога (0.0 = строго отрицательный)
      buy_require_funding_decreasing: true   # Если true — funding должен снижаться (делает BUY строже)

      # ==========================================================
      # Funding filter (SELL)
      # ==========================================================
      sell_enable_funding: true           # Если true — SELL требует funding > sell_funding_min_pct
      sell_funding_min_pct: 0.0001        # SELL: funding должен быть выше порога (0.0 = строго положительный)

      # ==========================================================
      # РИСК: SL/TP
      # ==========================================================
      stop_loss_pct: 2.0                  # Stop-Loss (%) от входа: BUY ниже, SELL выше
      take_profit_pct: 6.0                # Take-Profit (%) от входа: BUY выше, SELL ниже

      # ==========================================================
      # СВЕЖЕСТЬ СИГНАЛОВ (анти-спам)
      # ==========================================================
      max_signal_age_minutes: 60          # Общий дефолт; для каждого ТФ override-ится выше

      # ==========================================================
      # PLOTS: сохранение и ретеншн
      # ==========================================================
      plots_enabled: true                   # Сохранять графики (PNG)
      plots_dir: "artifacts/screener_plots" # Корневая папка для графиков
      plot_lookback_bars: 180               # Сколько свечей рисовать назад (может override-иться по ТФ)
      keep_plots_days: 2                    # Хранить графики не более N дней (по ТЗ: 2)

      # ==========================================================
      # TELEGRAM
      # ==========================================================
      telegram_send_messages: true        # Отправлять текстовые сообщения
      telegram_send_plots: true           # Отправлять графики
      telegram_silent: false              # Silent-режим (без уведомлений)

      telegram_extras_enabled: true       # Доп.рассылка «друзьям» (если у тебя это настроено)
      telegram_max_friends: 5             # Лимит друзей в доп.рассылке

      # ==========================================================
      # DEBUG
      # ==========================================================
      debug: true                         # Включить расширенные логи (dist/base/top списки)
      debug_top: 10                       # Сколько строк показывать в топ-листах кандидатов
