restart_interval_minutes: 1

screeners:
  - name: scr_liquidation_binance
    enabled: true
    version: "0.1-conservative-live"

    params:
      intervals: ["5m", "15m", "1h"]
      min_price: 0.00000001
      max_price: 1000

      volume_liquid_limit: [5000, 12000, 25000]
      liq_dominance_pct: 90.0

      risk_trade_pct: 1.5
      risk_equity_usdt: 1000
      risk_account_id: 1

      stop_loss_pct: 1.8
      take_profit_mode: "pct"
      take_profit_pct: 4.5
      entry_price_mode: "confirm_close"

      period_levels: 720
      pivot_left: 5
      pivot_right: 5
      level_cluster_tol_pct: 0.0025
      max_level_candidates: 12
      min_level_cluster_strength: 2
      allow_fallback_levels: false
      level_tol_pct: 0.004

      touch_lookback_candles: 2
      touch_mode: "touch_or_cross"

      confirm_lookforward: 2
      confirm_lookforward_map:
        "5m": 2
        "15m": 2
        "1h": 1
      confirm_body_min_pct: 35
      confirm_close_vs_anchor_mid: true

      anchor_wick_to_range_min_pct: 30
      anchor_wick_to_body_min: 1.2
      anchor_close_recovery_min_pct: 40
      anchor_to_level_max_pct: 0.45
      followthrough_max_pct: 0.30
      followthrough_check_candles: 1

      volume_avg_window: 300
      volume_spike_k:
        "5m": 2.2
        "15m": 2.0
        "1h": 1.7

      liq_relative_window: 36
      liq_relative_k: 1.3

      fresh_signal_minutes: 20
      fresh_signal_minutes_map:
        "5m": 15
        "15m": 30
        "1h": 90

      level_reaction_lookahead: 4
      level_reaction_min_pct: 0.30
      level_zone_extra_tol_pct: 0.0015
      acceptance_bins: 32
      require_htf_level_overlap: false
      htf_level_interval: "15m"
      htf_level_tol_pct: 0.0030

      max_anchor_candidates: 2
      trend_ema_span: 34
      trend_extension_max_pct: 3.5

      enable_funding: true
      kof_fund: 0.0012

      enable_plots: true
      plots_dir: "artifacts/screener_plots"
      plots_keep_days: 2
      plots_cleanup_every_minutes: 60
      plot_lookback: 120
      plot_lookforward: 40
      plot_max_signals: 30

      debug: true
      debug_top: 12

      telegram_enabled: true
      telegram_timezone: "Europe/Moscow"
      telegram_extras_enabled: true
      telegram_max_friends: 5
      telegram_send_text: true
      telegram_send_plots: true
      telegram_plot_mode: "photo"
      telegram_max_plot_signals: 30
      telegram_send_plot_followup_text: false