# config/screener_oi_conservative.yaml
# Консервативная версия:
# Цель — меньше, но качественнее сигналы.
# Подходит после того, как убедишься, что механика работает.
# Минус: может снова давать мало сигналов на слабом рынке.

restart_interval_minutes: 1

screeners:
  - name: scr_oi_binance
    enabled: true
    version: "0.5-conservative"

    params:
      exchange_id: 1
      intervals: ["5m", "15m", "1h"]

      min_price: 0.0000001
      max_price: 1000
      max_symbols: 0
      signal_mode: "both"

      # Глобальные дефолты
      min_base_quote_volume: 180000.0      # Минимальный средний объём базы
      min_oi_value: 1000000.0              # Минимальный OI value
      buy_min_oi_last_rise_pct: 0.8        # Минимальный рост OI на последнем участке
      max_oi_drawdown_from_peak_pct: 1.2   # Допустимая просадка OI
      min_signal_score: 48.0               # Минимальный score сигнала

      use_atr_normalization: true
      atr_period: 14
      buy_price_rise_atr_mult: 0.35
      buy_price_max_rise_atr_mult: 2.1

      base_minutes: 240
      trigger_minutes: 20

      per_interval_overrides:
        "5m":
          base_minutes: 240
          trigger_minutes: 20
          max_signal_age_minutes: 30
          plot_lookback_bars: 220

          min_base_quote_volume: 220000
          min_oi_value: 1200000
          buy_min_oi_last_rise_pct: 0.8
          max_oi_drawdown_from_peak_pct: 1.2
          min_signal_score: 48.0
          early_buy_min_signal_score: 43.0

          buy_allow_downtrend_base: false
          buy_require_volume_spike: true
          buy_oi_rise_pct: 1.6
          oi_value_confirm_pct: 1.2
          buy_volume_mult: 1.6
          buy_volume_spike_mult: 2.6
          buy_price_rise_pct: 0.7
          buy_price_max_rise_pct: 2.8
          buy_min_green_candles: 2
          buy_require_last_green: true
          buy_price_rise_atr_mult: 0.30
          buy_price_max_rise_atr_mult: 2.1

          sell_oi_drop_one_candle_pct: 1.5
          sell_oi_drop_window_pct: 1.8
          sell_price_drop_last_pct: 0.7
          sell_reversal_from_max_pct: 0.8
          sell_volume_spike_mult: 1.8
          sell_volume_drop_ratio: 0.75

        "15m":
          base_minutes: 720
          trigger_minutes: 60
          max_signal_age_minutes: 45
          plot_lookback_bars: 180

          min_base_quote_volume: 260000
          min_oi_value: 1400000
          buy_min_oi_last_rise_pct: 0.75
          max_oi_drawdown_from_peak_pct: 1.3
          min_signal_score: 46.0
          early_buy_min_signal_score: 41.0

          buy_allow_downtrend_base: false
          buy_require_volume_spike: true
          buy_oi_rise_pct: 1.4
          oi_value_confirm_pct: 1.0
          buy_volume_mult: 1.20
          buy_volume_spike_mult: 1.70
          buy_price_rise_pct: 0.45
          buy_price_max_rise_pct: 2.8
          buy_min_green_candles: 2
          buy_require_last_green: true
          buy_price_rise_atr_mult: 0.18
          buy_price_max_rise_atr_mult: 2.1

          sell_oi_drop_one_candle_pct: 1.2
          sell_oi_drop_window_pct: 1.6
          sell_price_drop_last_pct: 0.7
          sell_reversal_from_max_pct: 0.8
          sell_volume_spike_mult: 1.5
          sell_volume_drop_ratio: 0.76

        "1h":
          base_minutes: 720
          trigger_minutes: 120
          max_signal_age_minutes: 120
          plot_lookback_bars: 140

          min_base_quote_volume: 450000
          min_oi_value: 2200000
          buy_min_oi_last_rise_pct: 0.65
          max_oi_drawdown_from_peak_pct: 1.5
          min_signal_score: 44.0
          early_buy_min_signal_score: 39.0

          buy_allow_downtrend_base: false
          buy_require_volume_spike: false
          buy_oi_rise_pct: 1.2
          oi_value_confirm_pct: 0.9
          buy_volume_mult: 1.05
          buy_volume_spike_mult: 1.40
          buy_price_rise_pct: 0.25
          buy_price_max_rise_pct: 3.0
          buy_min_green_candles: 1
          buy_require_last_green: true
          buy_price_rise_atr_mult: 0.12
          buy_price_max_rise_atr_mult: 2.0

          sell_oi_drop_one_candle_pct: 1.0
          sell_oi_drop_window_pct: 1.4
          sell_price_drop_last_pct: 0.6
          sell_reversal_from_max_pct: 0.7
          sell_volume_spike_mult: 1.4
          sell_volume_drop_ratio: 0.78

      price_sideways_max_pct: 7.0
      price_downtrend_min_pct: 0.2
      base_volume_max_mult: 5.2

      buy_min_green_candles: 2
      buy_require_last_green: true

      enable_confirmed_buy: true
      enable_early_buy: true
      early_buy_min_green_candles: 1
      early_buy_require_last_green: false
      early_buy_volume_mult_ratio: 0.85
      early_buy_volume_spike_ratio: 0.80
      early_buy_price_rise_pct_ratio: 0.60
      early_buy_price_rise_atr_mult_ratio: 0.60
      early_buy_min_signal_score: 42.0

      oi_calc_key: "open_interest"
      oi_plot_key: "open_interest_value"

      enable_funding: true
      buy_funding_max_pct: 0.015
      buy_require_funding_decreasing: false

      sell_enable_funding: true
      sell_funding_min_pct: 0.0

      stop_loss_pct: 2.0
      take_profit_pct: 6.0

      max_signal_age_minutes: 30

      plots_enabled: true
      plots_dir: "artifacts/screener_plots"
      plot_lookback_bars: 220
      keep_plots_days: 2

      telegram_send_messages: true
      telegram_send_plots: true
      telegram_silent: false

      telegram_extras_enabled: true
      telegram_max_friends: 5

      debug: true
      debug_top: 20