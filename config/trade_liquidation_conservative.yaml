# Консервативный пресет.
# Подходит, если приоритет — переживать затяжные движения, снизить нагрузку на депозит и реже попадать в перегруз по позициям.
# Главная идея: меньше плечо, меньше риск на вход, меньше суммарная загрузка портфеля, чуть раньше защитные действия.

# ============================================================
# Trade Platform — конфиг трейдера trade_liquidation
# Проверенная и прокомментированная версия
# ============================================================
# Как часто запускать новый цикл трейдера (в минутах).
# 0.1 = примерно один цикл каждые 6 секунд.
restart_interval_minutes: 0.1

traders:
  - name: trade_liquidation                  # Имя трейдера; используется в логах, метаданных и reconcile
    enabled: true                            # true = трейдер активен и выполняет циклы; false = полностью выключен
    version: "1.0"                           # Версия стратегии/логики; служебно-информативный параметр

    params:
      # ======================================================
      # Performance / Throughput tuning
      # ======================================================
      max_recovery_symbols_per_cycle: 10      # Сколько символов максимум обрабатывать recovery-блоком за один цикл
      max_recovery_actions_per_cycle: 12      # Сколько суммарно recovery-действий (SL/TP/TRL/cleanup) можно сделать за цикл
      max_symbols_per_cycle: 10               # Сколько открытых символов обслуживать за один цикл основного управления
      use_exchange_snapshot_per_cycle: true   # true = собирать единый snapshot биржи на цикл, чтобы снизить REST-нагрузку

      # ======================================================
      # Logging control / anti-spam
      # ======================================================
      log_level_default: INFO                 # Базовый уровень логирования: DEBUG / INFO / WARNING / ERROR
      log_level_noisy_blocks: DEBUG           # Уровень для шумных служебных блоков, чтобы не забивать INFO
      log_rate_limit_sec:
        hedge_deferred: 180                   # Не повторять лог HEDGE_OPEN_DEFERRED чаще, чем раз в 180 сек на символ
        hedge_binding: 180                    # Не повторять лог HEDGE_BIND created=False чаще, чем раз в 180 сек
        entry_block: 120                      # Не повторять лог ENTRY_BLOCK чаще, чем раз в 120 сек
        entry_status: 120                     # Не повторять лог ENTRY_STATUS чаще, чем раз в 120 сек
        stale_add: 180                        # Не повторять штатный лог stale-add чаще, чем раз в 180 сек
      enable_cycle_summary: true              # true = печатать агрегированную сводку по результату каждого/каждого N-го цикла
      cycle_summary_interval: 1               # Как часто печатать CYCLE_SUMMARY: 1 = каждый цикл, 2 = через цикл и т.д.
      suppress_repeated_logs: true            # true = подавлять подряд идущие одинаковые steady-state логи

      # ======================================================
      # Идентификация биржи / аккаунта
      # ======================================================
      exchange_id: 1                          # ID биржи в БД/справочниках платформы
      account_name: base_main                 # Человеко-читаемое имя аккаунта
      account_id: 1                           # Внутренний ID аккаунта в системе

      # ======================================================
      # Источник сигналов (скринеры) и фильтры по сигналам
      # ======================================================
      screener_name: ["scr_liquidation_binance", "scr_oi_binance", "scr_pump_binance"]  # Какие скринеры считать источником новых сигналов
      signal_status_new: NEW                  # Какой статус сигнала считать пригодным для открытия новой позиции
      allowed_timeframes: ["5m", "15m", "1h"]  # Какие таймфреймы сигналов разрешены к торговле

      max_signal_age_minutes: 90             # Максимальный возраст сигнала в минутах; старше — сигнал игнорируется
      per_symbol_cooldown_minutes: 60        # Запрет на повторный вход по тому же символу в течение N минут
      expire_status: EXPIRED                 # Какой статус присваивать протухшим NEW-сигналам
      expire_old_signals: true               # true = автоматически экспирировать слишком старые NEW-сигналы
      expire_max_age_minutes: 60             # Порог старения NEW-сигнала для перевода в EXPIRED
      expire_batch_limit: 5000               # Максимум сигналов на один проход блока экспирации

      # ======================================================
      # Режим работы
      # ======================================================
      mode: live                             # Режим торговли: live = реальные ордера; paper/sim — если поддерживаются кодом

      # ======================================================
      # Binance API / сеть
      # ======================================================
      api_key_env: BINANCE_BASE_MAIN_API_KEY        # Имя env-переменной, откуда брать API KEY
      api_secret_env: BINANCE_BASE_MAIN_API_SECRET  # Имя env-переменной, откуда брать API SECRET
      base_url: https://fapi.binance.com            # Базовый URL Binance Futures API
      recv_window_ms: 5000                          # recvWindow для signed-запросов Binance
      timeout_sec: 10                               # Общий таймаут HTTP-запросов в секундах
      use_exchange_balance: false                   # true = читать баланс напрямую с биржи; false = использовать внутреннее состояние/кэш
      binance_connect_timeout_sec: 3.0              # Таймаут установления соединения с API Binance
      binance_read_timeout_sec: 15.0                # Таймаут ожидания ответа после соединения
      binance_max_retries: 3                        # Сколько раз повторять сетевой запрос при временном сбое
      binance_retry_backoff_sec: 1.0                # Пауза между сетевыми ретраями

      # ======================================================
      # Получение и кэширование баланса
      # ======================================================
      wallet_balance_retries: 3                     # Сколько раз повторять запрос баланса при ошибке
      wallet_balance_retry_backoff_sec: 3.0         # Пауза между попытками чтения баланса
      wallet_balance_cache_ttl_sec: 180             # Сколько секунд считать значение баланса актуальным в кэше
      wallet_balance_poll_sec: 10                   # Как часто обновлять баланс при периодическом опросе

      # ======================================================
      # Риск и ограничения на позиции
      # ======================================================
      leverage: 10                                  # Торговое плечо
      margin_type: CROSSED                          # Тип маржи: CROSSED или ISOLATED
      hedge_enabled: true                           # true = использовать hedge mode с отдельными LONG/SHORT позициями

      # --- Hedge sizing с учетом funding
      hedge_funding_kof_limit: 0.6                  # Порог funding (%), после которого разрешается корректировать размер hedge
      hedge_koff_funding_boost: 1.6                 # Во сколько раз усиливать hedge_koff при выгодном funding
      hedge_koff: 0.6                               # Базовый размер hedge как доля от main-позиции
      hedge_max_ratio: 1.2                          # Жесткий максимум размера hedge относительно объема main

      hedge_trigger_buffer_pct: 0.8                 # Буфер в % перед открытием hedge, чтобы не реагировать на микрошум
      hedge_cooldown_sec: 240                       # Минимальная пауза между действиями по hedge на одном символе
      hedge_reopen_enabled: true                    # Разрешить повторное открытие hedge после его закрытия
      hedge_open_only_after_max_adds: true          # Открывать первый hedge только после выполнения всех разрешённых доборов main

      hedge_reopen_price_filter_enabled: true       # Включить фильтр повторного входа hedge по цене относительно anchor
      hedge_reopen_price_move_pct: 1.0              # Минимальное смещение цены (%) относительно anchor для повторного входа hedge
      hedge_reopen_anchor_shift_trigger_pct: 2.5    # При каком движении в сторону main сдвигать anchor для будущего hedge
      hedge_reopen_anchor_shift_step_pct: 1.5       # На сколько процентов сдвигать anchor при срабатывании условия
      hedge_reopen_order_offset_pct: 1.0            # Насколько отступать pending hedge-ордером от anchor; 0 = старое поведение
      hedge_reopen_order_min_reprice_pct: 0.3       # Минимальное изменение trigger (%) для перевыставления hedge-ордера
      hedge_reopen_reprice_cooldown_sec: 30         # Пауза между перевыставлениями pending hedge-ордера

      main_add_on_hedge_price_diff_enabled: true    # Разрешить дополнительный добор main, если entry main слишком далеко от entry hedge
      main_add_on_hedge_price_diff_pct: 10.0        # Порог расхождения entry main и hedge в %, после которого разрешён такой добор
      main_add_on_hedge_price_diff_koff_lot: 2.0    # Объем дополнительного добора как множитель от текущего объема main
      hedge_promote_survivor_to_main_enabled: true  # Если main закрылась, а hedge выжила — создать из surviving hedge новую safe main-позицию

      # --- Profit optimization / balanced hedge unwind
      hedge_unwind_enabled: true                    # true = частично разгружать hedge, когда цена идёт обратно в пользу main
      hedge_unwind_step1_pct: 0.8                   # Первый шаг unwind при движении цены на 0.8% в сторону main от entry hedge
      hedge_unwind_step1_share: 0.25                # Какая доля исходного hedge-объема закрывается на шаге 1
      hedge_unwind_step2_pct: 1.6                   # Второй шаг unwind при движении на 1.6% в сторону main
      hedge_unwind_step2_share: 0.25                # Какая доля исходного hedge-объема закрывается на шаге 2
      hedge_unwind_full_exit_enabled: true          # true = полностью закрывать остаток hedge при сильном возврате цены
      hedge_unwind_full_exit_pct: 2.4               # На каком движении (%) полностью выходить из hedge
      hedge_unwind_cooldown_sec: 45                 # Пауза между частичными разгрузками hedge
      hedge_unwind_min_qty_ratio: 0.15              # Не делать unwind, если остаток станет меньше 15% исходного объема hedge

      # --- Adaptive hedge AI (мягкое увеличение hedge только при усилении движения против main)
      hedge_adaptive_enabled: true                  # true = включить адаптивное усиление hedge при ухудшении движения против main
      hedge_adaptive_trigger_pct: 0.8               # После какого adverse move (%) вообще запускать adaptive-логику
      hedge_adaptive_step_pct: 0.8                  # Размер одного шага adverse move (%) для дополнительного усиления hedge
      hedge_adaptive_boost_per_step: 0.05           # Сколько добавлять к hedge_koff на каждый шаг ухудшения
      hedge_adaptive_max_extra_koff: 0.35           # Максимальная добавка к hedge_koff от adaptive-логики

      # --- Защита от плохого funding по hedge
      hedge_funding_guard_enabled: true             # true = динамически сокращать/закрывать hedge при токсичном funding
      hedge_funding_bad_limit_pct: 0.8              # Funding (%) от которого hedge считается дорогим для удержания
      hedge_funding_reduce_share: 0.35              # Какую долю hedge сократить при плохом funding
      hedge_funding_full_exit_limit_pct: 1.2        # Funding (%), при котором лучше полностью выйти из hedge
      hedge_funding_cooldown_sec: 180               # Пауза между funding-защитными действиями
      hedge_funding_soft_cap_ratio: 0.25            # Мягкий потолок допустимого hedge при плохом funding

      # ======================================================
      # Hedge trailing
      # ======================================================
      hedge_trailing_enabled: true                  # Включить отдельный trailing-ордер для hedge-позиции
      hedge_trailing_activation_pct: 2.0            # При каком профит-движении (%) активируется trailing по hedge
      hedge_trailing_trail_pct: 0.6                 # callbackRate (%) для trailing stop по hedge
      hedge_trailing_activation_buffer_pct: 0.5     # Буфер к activation price, чтобы избежать мгновенного срабатывания при постановке
      hedge_trailing_place_retries: 3               # Сколько раз повторять постановку hedge trailing при ошибке Binance
      hedge_trailing_working_type: MARK_PRICE       # Какая цена триггера используется для hedge trailing: MARK_PRICE или CONTRACT_PRICE
      hedge_trailing_reissue_on_qty_change: true    # Перевыставлять hedge trailing при изменении объема hedge-позиции
      hedge_trailing_reissue_cooldown_sec: 30       # Минимальная пауза между перевыставлениями hedge trailing
      hedge_trailing_qty_tolerance: 1e-8            # Допуск сравнения qty; меньше считается шумом и игнорируется

      # ======================================================
      # Hedge stop-loss
      # ======================================================
      hedge_stop_loss_working_type: MARK_PRICE      # Какая цена используется для срабатывания hedge stop-loss
      hedge_stop_loss_reissue_cooldown_sec: 30      # Минимальная пауза между перевыставлениями hedge stop-loss
      hedge_stop_loss_pct: 1.0                      # Размер hedge stop-loss в % от entry hedge; 0 = стоп отключён

      # ======================================================
      # Hedge SL move to Break-Even / Profit-Lock
      # Работает только если hedge_stop_loss_pct > 0
      # ======================================================
      hedge_stop_loss_be_pct: 0.5                   # Куда переносить hedge SL после активации: запас/прибыль в % от entry
      hedge_stop_loss_be_activation_pct: 0.8        # При каком движении в прибыль активировать перенос hedge SL в BE / profit-lock
      hedge_stop_loss_be_pct_min: 0.5               # Нижняя допустимая граница hedge_stop_loss_be_pct
      hedge_stop_loss_be_pct_max: 10.0              # Верхняя допустимая граница hedge_stop_loss_be_pct
      hedge_stop_loss_be_activation_pct_min: 0.5    # Нижняя допустимая граница hedge_stop_loss_be_activation_pct
      hedge_stop_loss_be_activation_pct_max: 10.0   # Верхняя допустимая граница hedge_stop_loss_be_activation_pct

      hedge_close_on_main_positive: false           # true = закрывать hedge, если main-позиция уже ушла в уверенный плюс

      # ======================================================
      # Лимиты по позициям
      # ======================================================
      max_open_positions: 6                           # Максимум одновременно открытых main-позиций/символов под управлением
      max_position_notional_pct_wallet: 0.75          # Максимальный notional начального входа как % от wallet * leverage
      averaging_add_max_notional_pct_wallet: 8.0      # Максимальный notional одного добора как % от wallet * leverage; 0 = отключить ограничение
      main_position_max_notional_pct_wallet: 8.0      # Максимальный суммарный размер main-позиции как % от wallet * leverage
      hedge_position_max_notional_pct_wallet: 8.0     # Максимальный суммарный размер hedge-позиции как % от wallet * leverage
      risk_wallet_pct: 0.5                            # Базовый риск на сделку в % от кошелька
      live_entry_reduce_on_max_position: true         # true = если лимит превышен, уменьшать размер входа и пробовать снова
      live_entry_reduce_steps: 3                      # Сколько шагов уменьшения размера допускается перед окончательным отказом
      live_entry_reduce_factor: 0.75                  # На каждом шаге размер входа умножается на этот коэффициент

      # ======================================================
      # Базовые SL / TP
      # ======================================================
      stop_loss_pct: 1.8          # Базовый stop-loss (%) по основной позиции
      take_profit_pct: 5.0        # Базовый full take-profit (%) по main; используется как fallback, если partial TP выключен

      # --- Частичная фиксация прибыли по main
      main_partial_tp_enabled: true                 # true = использовать ступенчатую фиксацию прибыли по main вместо единого full TP
      main_partial_tp1_pct: 1.6                     # При каком движении (%) в прибыль закрывать первый partial TP main
      main_partial_tp1_share: 0.25                  # Какую долю текущей main-позиции закрыть на первом partial TP
      main_partial_tp2_pct: 3.2                     # При каком движении (%) в прибыль закрывать второй partial TP main
      main_partial_tp2_share: 0.25                  # Какую долю позиции закрыть на втором partial TP
      main_partial_tp_cooldown_sec: 45              # Минимальная пауза между частичными закрытиями main
      main_partial_tp_min_qty_ratio: 0.15           # Не делать partial TP, если остаток станет слишком маленьким (< 15% исходного)
      recalc_sl_tp: true                            # true = пересчитывать SL/TP/trailing после доборов и изменения средней цены

      # ======================================================
      # Вход и bracket-ордера
      # ======================================================
      entry_order_type: market                      # Тип входного ордера: market или limit
      sl_order_mode: stop_market                    # Каким типом выставлять защитный stop-loss
      tp_order_mode: take_profit_market             # Каким типом выставлять fallback full TP, когда partial TP выключен

      reduce_only: true                             # true = закрывающие/защитные ордера должны только уменьшать позицию
      working_type: MARK_PRICE                      # Какая цена используется как trigger для SL/TP/условных ордеров
      time_in_force: GTC                            # Время жизни ордера: GTC / IOC / FOK
      client_order_id_prefix: TL                    # Префикс для clientOrderId, чтобы различать ордера этого трейдера
      enable_stop_loss: true                        # true = ставить защитный stop-loss
      defer_stop_loss_until_last_add: true          # true = не ставить обычный SL сразу, пока не выполнены все доборы

      sl_after_last_add_distance_pct: 2.0           # На каком расстоянии (%) ставить SL после выполнения последнего добора

      # ======================================================
      # Main trailing stop
      # ======================================================
      trailing_enabled: true                        # true = использовать trailing stop по основной позиции
      trailing_activation_pct: 2.0                  # При каком движении (%) в прибыль активируется main trailing
      trailing_trail_pct: 0.4                       # callbackRate (%) trailing stop по main
      trailing_activation_buffer_pct: 0.3           # Буфер к activation price для защиты от мгновенного срабатывания
      tp_trigger_buffer_pct: 0.3                    # Буфер для triggerPrice fallback full TP
      trailing_place_retries: 3                     # Сколько раз повторять постановку main trailing при временной ошибке Binance
      tp_place_retries: 3                           # Сколько раз повторять постановку full TP при временной ошибке Binance
      trailing_reissue_on_qty_change: true          # Перевыставлять trailing при изменении объёма позиции, например после partial TP
      trailing_reissue_on_avg_entry_change: true    # Перевыставлять trailing при изменении средней цены входа main
      trailing_reissue_cooldown_sec: 90             # Минимальная пауза между обычными перевыставлениями main trailing
      trailing_qty_tolerance: 1e-8                  # Допуск сравнения qty; меньше значения считается несущественным шумом
      trailing_place_guard_sec: 180                 # Защита от слишком частых попыток постановки одного и того же trailing в живом процессе
      trailing_verify_interval_sec: 30              # Период страховочной проверки: если trailing потерялся, бот попробует восстановить его без рестарта
      # Важно:
      # - Main trailing может ставиться ещё до выполнения всех доборов.
      # - Если цена сразу идёт в прибыль, partial TP фиксирует часть объёма, а trailing ведёт остаток.
      # - После патча бот периодически проверяет наличие trailing и восстанавливает его, если он потерялся.

      # ======================================================
      # Усреднение (averaging / adds)
      # ======================================================
      averaging_enabled: true                       # true = разрешить доборы позиции при движении против входа
      averaging_max_adds: 1                         # Сколько максимум доборов разрешено для одной main-позиции
      averaging_add_position_multiplier: 1.5        # Во сколько раз увеличивать позицию на первом доборе ADD1
      averaging_add_pct_of_position: 100.0          # Для последующих доборов: какой % от текущей позиции добирать

      # Построение уровней для доборов
      averaging_levels_tf: 4h                       # Таймфрейм, на котором искать уровни для доборов
      averaging_levels_lookback_hours: 600          # Глубина истории в часах для поиска уровней усреднения
      averaging_levels_method: combined             # Метод построения: combined = pivot + volume confirmation
      averaging_level_tolerance_pct: 0.15           # Допуск вокруг найденного уровня, при котором он считается валидным
      averaging_min_level_distance_pct: 5.0         # Минимальная дистанция от текущей/входной цены до уровня добора

      # Параметры volume profile
      averaging_vp_bins: 48                         # Сколько bins использовать для volume profile
      averaging_vp_top_nodes: 10                    # Сколько top volume nodes учитывать при выборе уровней

      # Параметры pivot / кластеризации
      averaging_pivot_left: 5                       # Сколько свечей слева учитывать для pivot
      averaging_pivot_right: 5                      # Сколько свечей справа учитывать для pivot
      averaging_cluster_tolerance_pct: 0.25         # Допуск для объединения близких уровней в один кластер

      # Технические параметры перевыставления/сравнения уровней
      replace_cooldown_sec: 60                      # Пауза между cancel/replace условных ордеров
      avg_eps_pct: 0.02                             # Допуск сравнения средних цен/уровней в процентах
      price_eps_ticks: 2                            # Допуск сравнения цены в тиках инструмента
      add_price_tolerance_pct: 0.08                 # Не перевыставлять ADD, если изменение цены/триггера меньше этого порога
      add_qty_tolerance: 1e-8                       # Не перевыставлять ADD при микроскопическом изменении объёма

      # ======================================================
      # Debug / логирование
      # ======================================================
      debug: false                                  # true = включить расширенные debug-логи по трейдеру
      debug_top: 10                                 # Сколько элементов выводить в top/debug-диагностиках
      ema_log_enabled: false                        # true = включить подробные EMA-логи, если используются в стратегии/диагностике

      # ======================================================
      # Backfill закрытых позиций
      # ======================================================
      backfill_run_on_startup: true                 # true = запускать backfill сразу при старте процесса
      backfill_enabled: true                        # true = включить периодический backfill по закрытым позициям
      backfill_interval_sec: 300                    # Интервал периодического backfill в секундах
      backfill_lookback_days: 3                     # За сколько дней назад искать закрытые позиции для backfill
      backfill_batch_limit: 50                      # Сколько записей обрабатывать за один батч backfill
      backfill_overwrite: true                      # true = перезаписывать уже рассчитанные служебные поля
      backfill_fill_fees: true                      # true = подтягивать и заполнять комиссии по fills

      # ======================================================
      # Portfolio cap
      # ======================================================
      portfolio_cap_ratio: 0.5      # Если суммарная загрузка портфеля >= 70% wallet, новые сделки не открывать; 0 = OFF

      # ======================================================
      # Reconcile (сверка биржи и леджера)
      # ======================================================
      reconcile_enabled: true                       # true = включить сверку биржевого состояния и локального ledger
      reconcile_qty_tolerance: 1e-8                 # Допуск расхождения по qty перед тем, как считать mismatch значимым
      reconcile_auto_close_ledger: true             # Автоматически закрывать запись в ledger, если позиции на бирже уже нет
      reconcile_auto_adjust_ledger_qty_current: true  # Автоматически синхронизировать qty_current в ledger по факту биржи
      reconcile_adjust_only_our_positions: true     # Корректировать только те позиции, которые создал этот бот
      reconcile_ignore_external_positions: true     # Игнорировать внешние позиции, открытые вне этого трейдера
      reconcile_every_n_cycles: 2                   # Как часто запускать reconcile: 2 = раз в два цикла
      reconcile_log_diffs: true                     # true = логировать найденные расхождения
      reconcile_external_log_level: debug           # На каком уровне логировать внешние позиции/расхождения
      reconcile_binance_adds_enabled: true          # Сверять исполнения ADDn по истории Binance
      reconcile_binance_adds_every_sec: 300         # Как часто сверять ADDn по истории Binance
      reconcile_auto_adjust_ledger_value_usdt: false   # Автосинхронизация value_usdt в ledger; false уменьшает шум и лишние записи
      reconcile_refresh_position_value_usdt: false     # Обновлять ли value_usdt по рынку во время reconcile; false = меньше шумных refresh
      reconcile_auto_sync_entry_price: true            # Синхронизировать entry/avg price ledger с фактическим entryPrice биржи
      reconcile_entry_price_tolerance_pct: 0.001       # Порог относительного расхождения для entry price sync
      reconcile_sync_after_recovery: true              # После recovery сразу подтягивать qty/entry/value из positionRisk
      reconcile_value_refresh_min_delta_usdt: 2.0     # Минимальное изменение value_usdt, чтобы обновление имело смысл
      reconcile_value_tolerance_usdt: 2.5             # Порог, после которого расхождение value_usdt считается значимым

      # ======================================================
      # Auto recovery
      # ======================================================
      auto_recovery_enabled: true                   # true = автоматически восстанавливать защитные ордера и служебные связки
      recovery_place_sl: true                       # Пытаться восстанавливать отсутствующий stop-loss
      recovery_place_tp: true                       # Пытаться восстанавливать отсутствующий full TP (когда он вообще используется логикой)
      recovery_place_trailing: true                 # Пытаться восстанавливать отсутствующий trailing ордер/активацию trailing
      recovery_max_age_hours: 240                   # Не восстанавливать слишком старые позиции, чтобы не трогать «исторический мусор»

      # ======================================================
      # Async REST
      # ======================================================
      async_rest_enabled: true                      # true = выполнять часть REST-запросов параллельно
      async_rest_workers: 8                         # Сколько worker-потоков/задач использовать для async REST
      async_rest_timeout_sec: 8                     # Таймаут отдельного async REST-запроса в секундах

      # ======================================================
      # Health monitor / alerting
      # ======================================================
      health_monitor_enabled: true                  # Включить агрегированный health-monitor по циклам и recovery/reconcile событиям
      health_report_interval_sec: 600               # Печатать health summary раз в 10 минут; хороший баланс между полезностью и шумом
      health_slow_cycle_threshold_sec: 20           # Считать цикл медленным, если elapsed превышает 20 сек

      # Пороговые условия для warning/alert логики.
      # Эти значения не останавливают трейдинг, а поднимают заметность деградации.
      health_alert_open_positions_without_trailing: 1  # Алертить, если есть хотя бы 1 открытая main-позиция без trailing, когда trailing должен быть уже активен
      health_alert_recovery_repeats_per_symbol: 3      # Алертить, если один и тот же symbol восстанавливается слишком часто за окно мониторинга
      health_alert_reconcile_cycles: 3                 # Алертить, если reconcile несколько циклов подряд находит существенные расхождения
      health_alert_slow_cycles: 3                      # Алертить, если несколько циклов подряд считаются медленными
      health_alert_min_interval_sec: 900               # Антиспам: повторять одинаковый alert не чаще раза в 15 минут

      # Telegram-канал для health-alerts.
      # По умолчанию выключено, чтобы сначала спокойно обкатать health-monitor только на логах.
      health_telegram_enabled: false               # true = дублировать критичные health-alerts в Telegram
      health_telegram_include_friends: false       # Подмешивать friend/chat list, если это поддержано текущим notifier-слоем
      health_telegram_max_friends: 0               # 0 = никого дополнительно не уведомлять

