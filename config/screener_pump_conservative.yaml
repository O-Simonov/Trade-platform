# ============================================================
# Pump Screener Config — conservative profile
# Файл: config/screener_pump_conservative.yaml
# Назначение:
#   Консервативный конфиг для pump-скринера Binance futures/perpetual.
#
# Основная идея скринера:
#   1) найти импульс цены (pump / expansion),
#   2) проверить подтверждение объёмом,
#   3) проверить подтверждение OI / CVD / funding,
#   4) присвоить score сигналу,
#   5) отфильтровать шум и оставить только более качественные сигналы.
#
# Особенность conservative-профиля:
#   - меньше сигналов,
#   - выше требования к ликвидности,
#   - строже подтверждение объёмом и потоком,
#   - выше пороги score,
#   - меньше tolerance к перегретым и слабым сетапам.
#
# ВАЖНО:
#   - Профиль сделан по той же структуре, что и базовый screener_pump.yaml.
#   - Комментарии приведены в том же стиле, чтобы конфиги было проще
#     читать, сравнивать и дальше поддерживать.
# ============================================================

# Как часто перезапускать полный цикл скринера в минутах.
restart_interval_minutes: 1

screeners:
  - name: "scr_pump_binance"
    enabled: true                      # Включен ли этот скринер.
    runner: "scr_pump_binance"         # Имя python-раннера / класса / модуля скринера.
    exchange: "binance"                # Биржа для скринера.
    market_type: "futures"             # Тип рынка: perpetual / futures.
    version: "0.2-conservative"        # Версия конфигурации / профиль conservative.

    # --------------------------------------------------------
    # Интервалы, на которых скринер будет искать сигналы.
    # 5m = быстрые сигналы, но профиль остаётся строгим
    # 15m = основной рабочий интервал
    # 1h = редкие, но более качественные сигналы
    # --------------------------------------------------------
    intervals:
      - "5m"
      - "15m"
      - "1h"

    # --------------------------------------------------------
    # Ограничения по Universe / Symbols
    # Conservative-профиль держит universe немного уже,
    # чтобы не тратить внимание на слишком слабые рынки.
    # --------------------------------------------------------
    universe:
      enabled: true                    # Использовать ли фильтрацию пула инструментов.
      quote_asset: "USDT"              # Работать только с USDT-парами.
      futures_only: true               # Брать только фьючерсные/перпетуальные инструменты.
      active_only: true                # Исключать делистнутые/неактивные рынки.
      max_symbols: 400                 # Максимум символов за один цикл.
      symbols_whitelist: []            # Если заполнить - скринить только эти символы.
      symbols_blacklist: []            # Исключить конкретные символы.
      min_price: 0.0000001             # Минимальная цена инструмента.
      max_price: 1000                  # Максимальная цена инструмента.
      min_tick_size: 0.0               # Мин. допустимый tick size. 0 = не фильтровать.

    # --------------------------------------------------------
    # Глобальные параметры запуска
    # Здесь conservative-профиль строже ограничивает повторные сигналы
    # и берёт меньше кандидатов за цикл.
    # --------------------------------------------------------
    runtime:
      signal_mode: "both"              # Режим сигналов: buy / sell / both.
      max_signal_age_minutes: 15       # Максимальный возраст сигнала, старше которого он не отправляется.
      cooldown_minutes: 45             # Защита от повторной отправки похожих сигналов по одному символу.
      max_signals_per_cycle: 12        # Ограничение количества сигналов за один цикл.
      sort_by: "score"                 # Как сортировать найденные сигналы: score / pct / volume / oi.
      descending: true                 # Сортировка по убыванию.
      require_fresh_last_bar: true     # Требовать, чтобы последняя свеча была свежей.
      use_closed_bar_only: true        # Использовать только закрытые свечи для большей стабильности.
      enable_debug_logs: true          # Подробные debug/info логи по стадиям фильтрации.
      debug_top: 3                     # Сколько лучших кандидатов выводить в debug-срезе.

    # --------------------------------------------------------
    # Исторические окна / lookback
    # Conservative-профиль местами смотрит чуть глубже,
    # чтобы слабые импульсы не проходили слишком легко.
    # --------------------------------------------------------
    windows:
      scan_lookback_bars: 140          # Сколько последних свечей анализировать в поиске паттерна.
      base_lookback_bars: 28           # База/накопление до импульса.
      confirm_lookback_bars: 7         # Сколько свечей смотреть для подтверждения после триггера.
      oi_lookback_bars: 14             # Окно анализа OI.
      cvd_lookback_bars: 14            # Окно анализа CVD.
      funding_lookback_points: 1       # Сколько последних funding значений учитывать.
      atr_lookback_bars: 14            # Окно ATR для оценки силы движения.

    # --------------------------------------------------------
    # Ликвидность / качество рынка
    # Здесь conservative-профиль особенно строгий:
    # отсеиваем тонкие и хуже торгуемые инструменты.
    # --------------------------------------------------------
    liquidity:
      min_quote_volume_24h: 12000000   # Минимальный суточный quote-volume по рынку.
      min_base_quote_volume: 450000    # Минимальный медианный объём базы перед импульсом.
      min_last_bar_quote_volume: 150000 # Минимальный объём последней свечи.
      min_notional_oi: 5000000         # Минимальный OI в денежном выражении.
      max_spread_bps: 25               # Максимальный допустимый спред в bps, если доступен.
      skip_low_liquidity: true         # Жёстко отбрасывать низколиквидные инструменты.

    # --------------------------------------------------------
    # Фильтр качества базы
    # Идея: хороший pump/squeeze чаще стартует из спокойной,
    # неразболтанной и не перегретой базы.
    # --------------------------------------------------------
    base_quality:
      enabled: true                    # Включить фильтр качества базы.
      base_range_max_pct: 6.0          # Максимальный диапазон базы (%), чтобы база не была слишком "разболтанной".
      base_noise_max_pct: 3.0          # Максимальный шум внутри базы (%).
      base_trend_abs_max_pct: 3.5      # Максимальный общий тренд базы по модулю (%).
      base_volume_max_mult: 1.8        # База не должна уже быть перегрета объёмом.
      base_green_red_imbalance_max: 0.60 # Дисбаланс зелёных/красных свечей в базе; защищает от уже идущего тренда.
      require_calm_base: true          # Жёстко требовать "спокойную" базу.

    # --------------------------------------------------------
    # Общие volume-фильтры
    # Volume — один из главных фильтров качества pump-сигнала.
    # В conservative-профиле подтверждение объёмом строже.
    # --------------------------------------------------------
    volume_filters:
      enabled: true                     # Включить объёмные фильтры.
      min_volume_mult: 1.45             # Минимальный multiplier объёма к базовому среднему/медиане.
      min_volume_spike_mult: 2.0        # Минимальный spike объёма на триггерной свече.
      min_volume_acceleration: 1.10     # Ускорение объёма против предыдущих свечей.
      require_volume_confirmation: true # Без подтверждения объёмом сигнал не проходит.
      use_median_base_volume: true      # Использовать медиану базы вместо среднего для большей устойчивости.
      max_anomaly_volume_mult: 9.0      # Если объём аномально огромный, можно помечать как перегретый.

    # --------------------------------------------------------
    # BUY-профиль
    # Ищем импульс вверх с более строгим подтверждением потока.
    # --------------------------------------------------------
    buy:
      enabled: true                    # Включить BUY-сигналы.
      enable_early: true               # Ранние BUY-сигналы (менее жёсткие фильтры).
      enable_confirmed: true           # Подтверждённые BUY-сигналы (более жёсткие фильтры).

      # Базовая геометрия импульса
      window_minutes: 15               # За какое время искать импульс вверх.
      min_price_change_pct: 2.1        # Минимальный рост цены для BUY-паттерна.
      min_price_change_atr: 0.9        # Минимальная сила движения в ATR.
      max_price_extension_pct: 6.5     # Не брать слишком перерастянутый импульс.
      min_green_candles: 3             # Минимум зелёных свечей в импульсе.
      require_last_bar_green: true     # Требовать ли, чтобы последняя свеча была зелёной.
      require_close_near_high: true    # Требовать ли закрытие у верхней части свечи.

      # Объём BUY
      min_volume_mult: 1.55            # Минимальный volume multiplier для BUY.
      min_volume_spike_mult: 2.10      # Минимальный spike объёма на BUY.
      min_volume_acceleration: 1.12    # Минимальное ускорение объёма на BUY.

      # OI / CVD BUY
      min_oi_delta_pct: 0.45           # Минимальный рост OI в %.
      min_oi_value_delta_pct: 0.50     # Минимальный рост OI в денежном выражении.
      min_cvd_delta_pct: 0.10          # Минимальный рост CVD.
      require_oi_confirmation: true    # Требовать ли подтверждение OI.
      require_cvd_confirmation: true   # Требовать ли подтверждение CVD.
      oi_up_ratio_min: 0.65            # Доля ап-свечей OI внутри окна.
      oi_drawdown_from_peak_min_pct: -0.25 # Допустимая просадка OI от локального пика.

      # Структурное подтверждение BUY
      breakout_lookback_bars: 24       # Окно для проверки локального breakout.
      require_breakout: true           # Требовать ли явный breakout над локальным диапазоном.
      breakout_buffer_pct: 0.20        # Буфер breakout над локальным high.
      allow_retest_entry: true         # Разрешить сигнал после retest вместо чистого breakout.

      # Score BUY
      min_signal_score: 50             # Минимальный score BUY-сигнала.
      early_min_signal_score: 44       # Минимальный score для early BUY.
      confirmed_min_signal_score: 58   # Минимальный score для confirmed BUY.

    # --------------------------------------------------------
    # SELL-профиль
    # Ищем локальный pump + признаки разворота / exhaustion.
    # Здесь также требования строже, чем в базовом профиле.
    # --------------------------------------------------------
    sell:
      enabled: true                    # Включить SELL-сигналы.
      enable_early: true               # Ранние SELL-сигналы.
      enable_confirmed: true           # Подтверждённые SELL-сигналы.

      # Базовая логика pump -> reversal
      window_minutes: 24               # За какое время искать pump и разворот.
      min_pump_pct: 3.2                # Минимальный рост перед сигналом SELL.
      min_pump_atr: 1.1                # Минимальная сила pump в ATR.
      confirm_lookforward_bars: 3      # Сколько свечей ждать подтверждение разворота.
      reversal_from_peak_pct: 0.55     # Минимальный откат от локального пика для SELL.
      min_red_body_pct: 0.22           # Минимальный размер красного тела свечи подтверждения.
      min_upper_wick_pct: 0.10         # Минимальный верхний фитиль как признак rejection.
      require_red_confirm: true        # Требовать красную свечу подтверждения.
      require_lower_high: true         # Требовать formation lower high.
      require_close_below_prev_close: true # Требовать закрытие ниже предыдущего close.
      confirm_close_position_max: 0.45 # Насколько низко в свече должен быть close при SELL-confirm.

      # Объём SELL
      min_volume_mult: 1.35            # Минимальный volume multiplier для SELL.
      min_volume_spike_mult: 1.75      # Минимальный spike объёма для SELL.
      require_volume_confirmation: true # Без объёма SELL не проходит.

      # OI / CVD SELL
      max_oi_delta_pct: 0.10           # Максимально допустимый дальнейший рост OI; выше = SELL слабее.
      max_cvd_delta_pct: 0.05          # Максимальный допустимый рост CVD.
      allow_flat_oi: false             # Разрешить флэтовый OI для SELL.
      require_oi_exhaustion: true      # Требовать ли явное истощение OI.
      require_cvd_weakness: true       # Требовать ли слабость CVD.

      # Score SELL
      min_signal_score: 52             # Минимальный score SELL-сигнала.
      early_min_signal_score: 46       # Минимальный score для early SELL.
      confirmed_min_signal_score: 60   # Минимальный score для confirmed SELL.

    # --------------------------------------------------------
    # OI / CVD trend-фильтры
    # Нужны для отделения реального потока от шума.
    # Здесь тренд-фильтры включены в более жёстком режиме.
    # --------------------------------------------------------
    trend_filters:
      enabled: true                    # Включить анализ тренда OI/CVD.
      trend_method: "both"             # Метод оценки тренда: ratio / slope / steps / both.
      trend_mode: "hard"               # soft = влияет на score, hard = обязателен, off = выключить.
      confirm_trend_bars: 3            # Сколько последних баров проверять на подтверждение.
      slope_bars: 4                    # Окно расчёта slope.
      oi_eps_pct: 0.02                 # Порог чувствительности OI.
      cvd_eps_pct: 0.02                # Порог чувствительности CVD.

      # BUY slope
      buy_oi_slope_min_bps: 2.5        # Минимальный положительный slope OI для BUY.
      buy_cvd_slope_min_bps: 1.5       # Минимальный положительный slope CVD для BUY.

      # SELL slope
      sell_oi_slope_max_bps: 0.5       # Для SELL OI не должен расти слишком сильно.
      sell_cvd_slope_max_bps: 0.25     # Для SELL CVD не должен быть слишком сильным вверх.

    # --------------------------------------------------------
    # Funding filter
    # В conservative-профиле funding работает жёстче.
    # --------------------------------------------------------
    funding:
      enabled: true                    # Включить funding-проверку.
      mode: "hard"                     # hard / soft / off.
      buy_max_funding_pct: 0.010       # Для BUY слишком высокий funding = риск перегрева.
      sell_min_funding_pct: 0.002      # Для SELL положительный funding может быть плюсом.
      sell_prefer_positive_funding: true # Для SELL положительный funding повышает качество шорт-сетапа.
      extreme_positive_funding_pct: 0.025 # Слишком высокий positive funding = перегрев.
      extreme_negative_funding_pct: -0.025 # Слишком высокий negative funding = риск контртренда.

    # --------------------------------------------------------
    # Score model
    # Итоговый сигнал оценивается по нескольким компонентам.
    # Потом сравнивается с min_signal_score.
    # Conservative-профиль сильнее поощряет цену/объём/OI
    # и держит более высокие проходные пороги.
    # --------------------------------------------------------
    scoring:
      enabled: true                    # Включить итоговый score.
      clamp_each_component_0_100: true # Ограничивать ли каждый компонент в диапазоне 0..100.
      normalize_total_to_100: true     # Нормализовать ли итоговый score к 100.

      # Веса score-компонентов
      weight_price: 0.24               # Вес силы движения цены.
      weight_volume: 0.22              # Вес подтверждения объёмом.
      weight_oi: 0.22                  # Вес подтверждения OI.
      weight_cvd: 0.10                 # Вес подтверждения CVD.
      weight_structure: 0.15           # Вес качества структуры/паттерна.
      weight_funding: 0.04             # Вес funding-составляющей.
      weight_base_quality: 0.03        # Вес качества базы.

      # Пороговые уровни качества
      weak_score_threshold: 40         # Ниже — слабый сигнал.
      medium_score_threshold: 55       # Средний сигнал.
      strong_score_threshold: 70       # Сильный сигнал.
      very_strong_score_threshold: 82  # Очень сильный сигнал.

    # --------------------------------------------------------
    # Фильтр перегретых / мусорных движений
    # Защищает от поздних входов после уже "улетевшего" рынка.
    # Conservative-профиль быстрее режет перегретые импульсы.
    # --------------------------------------------------------
    overheating:
      enabled: true                    # Включить фильтр перегрева.
      max_price_extension_pct: 9.0     # Максимальное растяжение цены от базы.
      max_oi_spike_pct: 6.5            # Слишком резкий рост OI может означать позднюю фазу.
      max_volume_spike_mult: 6.0       # Слишком дикий объём — возможен финальный выброс.
      reject_vertical_moves: true      # Отбрасывать почти вертикальные движения.
      vertical_move_atr_threshold: 2.4 # Если move в ATR выше порога — считать вертикальным.

    # --------------------------------------------------------
    # Фильтры против шумовых и фейковых сигналов
    # --------------------------------------------------------
    anti_noise:
      enabled: true                    # Включить anti-noise фильтры.
      min_body_to_range_ratio: 0.28    # Слишком маленькое тело относительно диапазона = шум.
      max_wick_to_body_ratio: 3.5      # Слишком большие фитили — рынок нестабилен.
      max_gap_pct: 2.0                 # Если есть резкий gap между барами — можно отбрасывать.
      reject_erratic_series: true      # Удалять хаотичные серии свечей.
      erratic_range_threshold_pct: 10.0 # Порог "дерганости" ряда свечей.

    # --------------------------------------------------------
    # Опции подготовки к optimizer / replay
    # Пока это конфигурационный задел под будущее.
    # --------------------------------------------------------
    optimizer:
      enabled: false                   # Оптимизатор в обычном рантайме выключен.
      profile_name: "pump_conservative" # Имя профиля параметров для optimizer/replay.
      store_metrics: true              # Сохранять метрики в результатах optimizer/replay.
      objective: "profit_factor"       # Базовая целевая метрика optimizer.
      min_trades: 20                   # Минимум сделок для валидности результата.
      min_win_rate_pct: 40             # Минимальный допустимый winrate.
      min_avg_pnl_pct: 0.12            # Минимальный средний pnl на сделку.
      penalty_for_low_sample: true     # Штрафовать конфиги с маленьким числом сделок.

    # --------------------------------------------------------
    # Перекрытия параметров по таймфреймам
    # Один и тот же threshold для 5m и 1h почти всегда даёт
    # плохие результаты, поэтому тут отдельные настройки.
    # --------------------------------------------------------
    per_interval_overrides:
      "5m":
        runtime:
          max_signal_age_minutes: 8    # На 5m сигнал очень быстро стареет.
          cooldown_minutes: 30         # Умеренный cooldown для быстрых сетапов.

        windows:
          scan_lookback_bars: 110      # Для 5m можно смотреть чуть короче.
          base_lookback_bars: 22       # База для 5m короче.
          confirm_lookback_bars: 5     # Подтверждение короче.
          oi_lookback_bars: 10         # Окно OI компактнее.
          cvd_lookback_bars: 10        # Окно CVD компактнее.

        buy:
          window_minutes: 6            # Быстрый buy-импульс.
          min_price_change_pct: 1.8    # На 5m порог ниже, чем на старших ТФ.
          min_price_change_atr: 0.75   # Чуть мягче ATR-порог.
          min_green_candles: 3         # Требуем серию зелёных свечей даже на младшем ТФ.
          min_volume_mult: 1.45        # Объёмный фильтр остаётся строгим.
          min_volume_spike_mult: 1.95  # Spike чуть ниже, чем у базового conservative 15m.
          min_oi_delta_pct: 0.35       # OI-порог немного мягче.
          min_oi_value_delta_pct: 0.40 # Денежный OI-порог немного мягче.
          min_signal_score: 48         # Общий порог score для 5m.
          early_min_signal_score: 42   # Early BUY для 5m.
          confirmed_min_signal_score: 56 # Confirmed BUY для 5m.

        sell:
          window_minutes: 10           # Быстрый поиск локального pump/reversal.
          min_pump_pct: 2.6            # На 5m локальный pump меньше, чем на старших ТФ.
          reversal_from_peak_pct: 0.40 # Откат от пика может быть меньше.
          min_signal_score: 50         # Общий score SELL на 5m.
          early_min_signal_score: 44   # Early SELL на 5m.
          confirmed_min_signal_score: 58 # Confirmed SELL на 5m.

      "15m":
        runtime:
          max_signal_age_minutes: 15   # На 15m сигнал живёт дольше.
          cooldown_minutes: 45         # Базовый conservative cooldown.

        buy:
          window_minutes: 15           # Стандартный buy window.
          min_price_change_pct: 2.1    # Баланс чувствительности и качества.
          min_price_change_atr: 0.90   # ATR подтверждение.
          min_signal_score: 50         # Основной score.
          early_min_signal_score: 44   # Early.
          confirmed_min_signal_score: 58 # Confirmed.

        sell:
          window_minutes: 24           # Стандартный sell window.
          min_pump_pct: 3.2            # Стандартный порог pump.
          reversal_from_peak_pct: 0.55 # Стандартный откат от пика.
          min_signal_score: 52         # Основной score.
          early_min_signal_score: 46   # Early.
          confirmed_min_signal_score: 60 # Confirmed.

      "1h":
        runtime:
          max_signal_age_minutes: 90   # На 1h сигнал стареет медленнее.
          cooldown_minutes: 120        # Более длинный cooldown, чтобы не спамить одним инструментом.

        windows:
          scan_lookback_bars: 160      # На 1h имеет смысл смотреть глубже.
          base_lookback_bars: 32       # База длиннее.
          confirm_lookback_bars: 8     # Подтверждение дольше.
          oi_lookback_bars: 16         # OI window больше.
          cvd_lookback_bars: 16        # CVD window больше.

        liquidity:
          min_quote_volume_24h: 18000000 # Для 1h хотим ещё более ликвидный рынок.
          min_base_quote_volume: 800000 # База тоже должна быть ликвиднее.
          min_last_bar_quote_volume: 250000 # Последняя свеча должна быть весомой по объёму.
          min_notional_oi: 9000000     # Минимальный OI в деньгах для 1h выше.

        buy:
          window_minutes: 60           # Для 1h ищем более длинный импульс.
          min_price_change_pct: 3.0    # На 1h нужен более сильный move.
          min_price_change_atr: 1.10   # ATR-порог выше.
          max_price_extension_pct: 5.5 # На старшем ТФ ещё строже режем растянутые импульсы.
          min_green_candles: 2         # На 1h можно допустить меньше свечей, но сильнее по качеству.
          min_volume_mult: 1.65        # Более строгий volume filter.
          min_volume_spike_mult: 2.30  # Более строгий spike.
          min_oi_delta_pct: 0.70       # OI должен расти увереннее.
          min_oi_value_delta_pct: 0.80 # Денежный OI строже.
          min_cvd_delta_pct: 0.15      # CVD должен подтверждать сильнее.
          min_signal_score: 56         # Общий score на 1h выше.
          early_min_signal_score: 50   # Early на 1h.
          confirmed_min_signal_score: 64 # Confirmed на 1h.

        sell:
          window_minutes: 90           # Для 1h разворот формируется дольше.
          min_pump_pct: 4.5            # На 1h pump должен быть больше.
          min_pump_atr: 1.25           # Требуем более сильный pump в ATR.
          reversal_from_peak_pct: 0.80 # Более выраженный откат от пика.
          min_red_body_pct: 0.30       # Требуем более явную reversal candle.
          min_signal_score: 58         # Общий SELL score выше.
          early_min_signal_score: 52   # Early на 1h.
          confirmed_min_signal_score: 66 # Confirmed на 1h.

    # --------------------------------------------------------
    # Legacy flat params still used by current runtime
    # ВАЖНО: эти поля пока реально читаются runner-ом напрямую.
    # Поэтому держим их явно, чтобы не полагаться на дефолты.
    # --------------------------------------------------------
    exchange_id: 1                    # ID биржи в БД/системе.

    stop_loss_pct: 2.0               # Используется для расчёта SL в сигналах.
    take_profit_pct: 6.0             # Используется для расчёта TP в сигналах.

    keep_plots_days: 2               # Реально используется при очистке старых PNG.
    plots_dir: "artifacts/screener_plots"   # Папка сохранения графиков.
    plot_lookback: 180               # Сколько свечей слева показывать на графике.
    plot_lookforward: 30             # Сколько свечей справа показывать на графике.

    telegram_enabled: true           # Глобальный флаг отправки в Telegram.
    telegram_timezone: "Europe/Moscow"
    telegram_extras_enabled: true
    telegram_max_friends: 5
    telegram_send_text: false
    telegram_mode: "batch"
    telegram_max_signals: 50
    telegram_send_plots: true
    telegram_plot_mode: "photo"
    telegram_max_plot_signals: 30

    debug: true                      # Legacy debug-флаг для совместимости.
    debug_top: 20                    # Сейчас реально влияет на объём debug top-логов.

    # --------------------------------------------------------
    # Alerting / telegram / routing
    # --------------------------------------------------------
    alerts:
      enabled: true                    # Включить отправку сигналов.
      channel: "telegram"              # Канал доставки сигналов.
    # --------------------------------------------------------
    # Построение графиков
    # Графики дорогие по времени, поэтому лучше ограничивать.
    # --------------------------------------------------------
    plots:
      enabled: true                    # Строить ли графики.

    # --------------------------------------------------------
    # Storage / persistence
    # --------------------------------------------------------
    storage:
      enabled: true                    # Сохранять сигналы в БД.
      store_candidates: false          # Сохранять ли промежуточных кандидатов.
      store_rejections: false          # Сохранять ли причины отбраковки.
      store_metrics: true              # Сохранять метрики по сигналу.
      deduplicate_before_insert: true  # Проверять дубликаты перед вставкой.

    # --------------------------------------------------------
    # Совместимость / безопасный режим
    # Эти параметры помогают мягко внедрять новый конфиг.
    # --------------------------------------------------------
    compatibility:
      strict_mode: false               # Если true — падать при неизвестных/неиспользуемых полях.
      allow_unused_fields: true        # Разрешать временно лишние поля, пока код не догнал конфиг.
      fallback_to_legacy_logic: false  # Если true — позволить откат к старой логике при частичной интеграции.
