restart_interval_minutes: 1

screeners:
  - name: scr_liquidation_binance
    enabled: true
    version: "0.1-conservative-soft"

    params:
      intervals: ["5m", "15m", "1h"]
      min_price: 0.00000001
      max_price: 1000

      # Мин. объём ликвидаций в anchor-свече (USDT)
      volume_liquid_limit: [25000, 45000, 80000]

      # Сохраняем строгое доминирование
      liq_dominance_pct: 95.0

      # RISK / POSITION SIZE
      risk_trade_pct: 1.5
      risk_equity_usdt: 1000
      risk_account_id: 1

      # STOP LOSS / TAKE PROFIT
      stop_loss_pct: 1.8
      take_profit_mode: "pct"
      take_profit_pct: 4.5
      entry_price_mode: "confirm_close"

      # Уровни / логика
      period_levels: 720
      pivot_left: 5
      pivot_right: 5
      level_cluster_tol_pct: 0.0025
      max_level_candidates: 12
      min_level_cluster_strength: 3
      allow_fallback_levels: false
      level_tol_pct: 0.004

      # TOUCH / CROSS
      touch_lookback_candles: 2
      touch_mode: "touch_or_cross"

      # CONFIRMATION
      confirm_lookforward: 2
      confirm_lookforward_map:
        "5m": 2
        "15m": 2
        "1h": 1
      confirm_body_min_pct: 42
      confirm_close_vs_anchor_mid: true

      # Смягчённые anchor-фильтры
      anchor_wick_to_range_min_pct: 40
      anchor_wick_to_body_min: 1.4
      anchor_close_recovery_min_pct: 50
      anchor_to_level_max_pct: 0.30
      followthrough_max_pct: 0.18
      followthrough_check_candles: 1

      # Всплеск объёма / относительная сила ликвидации
      volume_avg_window: 300
      volume_spike_k:
        "5m": 2.6
        "15m": 2.3
        "1h": 2.0
      liq_relative_window: 36
      liq_relative_k: 1.8

      # Свежесть сигнала
      fresh_signal_minutes: 20
      fresh_signal_minutes_map:
        "5m": 12
        "15m": 25
        "1h": 75

      # Качество уровня / зоны
      level_reaction_lookahead: 4
      level_reaction_min_pct: 0.40
      level_zone_extra_tol_pct: 0.0015
      acceptance_bins: 32
      require_htf_level_overlap: true
      htf_level_interval: "15m"
      htf_level_tol_pct: 0.0030

      max_anchor_candidates: 2
      trend_ema_span: 34
      trend_extension_max_pct: 2.8

      # Funding
      enable_funding: true
      kof_fund: 0.0012

      # Графики
      enable_plots: true
      plots_dir: "artifacts/screener_plots"
      plots_keep_days: 2
      plots_cleanup_every_minutes: 60
      plot_lookback: 120
      plot_lookforward: 40
      plot_max_signals: 30

      # Дебаг
      debug: true
      debug_top: 12

      # Telegram
      telegram_enabled: true
      telegram_timezone: "Europe/Moscow"
      telegram_extras_enabled: true
      telegram_max_friends: 5
      telegram_send_text: true
      telegram_send_plots: true
      telegram_plot_mode: "photo"
      telegram_max_plot_signals: 30
      telegram_send_plot_followup_text: false