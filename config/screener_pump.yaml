# config/screener_pump_reviewed.yaml
# ------------------------------------------------------------
# PUMP screener config (scr_pump_binance)
#
# Ниже — проверенная и переписанная версия твоего конфига.
# Я оставил рабочую логику максимально близкой к текущей,
# но убрал неоднозначности и добавил комментарий почти к каждой переменной.
#
# Коротко по ревью:
# 1) Конфиг в целом валидный и рабочий.
# 2) SELL у тебя настроен адекватно и уже реально находил сигналы.
# 3) Основная проблема из логов была не в этом YAML, а в отправке в Telegram.
# 4) В конфиге были параметры, которые сейчас фактически не используются:
#    - все CVD-пороги, потому что enable_cvd: false
#    - все slope-пороги, потому что trend_method: "steps"
# 5) Дубликат alias-параметра trend_slope_points я убрал, чтобы не путал.
# ------------------------------------------------------------

# Как часто runner перезапускает полный цикл скринеров.
# У тебя стоит 1 минута — это нормально для частого мониторинга,
# но для SELL на 15m это даёт много повторных прогонов и дубликатов,
# которые потом отсекаются кодом.
restart_interval_minutes: 1

screeners:
  - name: scr_pump_binance         # Имя скринера. Должно совпадать с кодом/реестром скринеров.
    enabled: true                  # Включён ли этот скринер.
    version: "0.1"                 # Версия для логов/контроля совместимости.

    params:
      # ==========================================================
      # БАЗОВЫЕ НАСТРОЙКИ
      # ==========================================================

      buy_interval: "5m"           # Таймфрейм для BUY-режима. Runner запускает BUY отдельно на этом интервале.
      sell_interval: "15m"         # Таймфрейм для SELL-режима. Runner запускает SELL отдельно на этом интервале.

      exchange_id: 1               # ID биржи в твоей БД/системе. Обычно 1 = Binance.
      min_price: 0.00000001        # Минимальная цена инструмента для сканирования. Отсекает совсем мусорные/битые значения.
      max_price: 1000              # Максимальная цена инструмента для сканирования.

      max_symbols: 0               # Лимит числа символов на проход. 0 = сканировать все доступные активные символы.
      scan_lookback_bars: 480      # Сколько свечей грузить для расчётов.
                                   # Должно быть >= самого большого lookback + запас под подтверждения/окна.

      signal_mode: "both"          # Режим работы скринера: both|buy|sell.
                                   # Обычно runner сам подставляет режим отдельно, так что это скорее запасной дефолт.
      max_signal_age_minutes: 60   # Отсев старых сигналов в runner.
                                   # Если сигнал старше этого возраста, он не отправляется.
                                   # Для 15m это норм, но можно снизить до 20-30, если нужны только совсем свежие сигналы.

      # ==========================================================
      # BUY-ЛОГИКА (рост относительно средней базы)
      # ==========================================================

      buy_window_minutes: 5        # Окно, за которое измеряется ускорение/рост для BUY.
      buy_price_change_pct: 2.0    # Порог роста в процентах для BUY.
                                   # Для 5m это умеренно агрессивное значение: сигналов будет не слишком много.
      buy_base_lookback_bars: 240  # Сколько свечей брать для расчёта базовой средней цены перед BUY-сигналом.

      # ==========================================================
      # SELL-ЛОГИКА (памп + красная свеча подтверждения)
      # ==========================================================

      sell_window_minutes: 15      # Окно, в котором ищется памп для SELL.
      sell_pump_pct: 2.5           # Порог пампа в % относительно средней базы.
                                   # По твоим логам это значение реалистичное.
                                   # При 10% SELL-сигналов было бы очень мало или почти не было бы совсем.
      sell_base_lookback_bars: 240 # База для средней цены перед поиском пампа.
      sell_confirm_lookforward: 5  # Сколько следующих свечей просматривать после пампа,
                                   # чтобы найти подтверждающую "красную" свечу.

      # ==========================================================
      # OI / CVD: ИСТОЧНИКИ ДАННЫХ И ДЕЛЬТЫ
      # ==========================================================

      enable_oi: true              # Включить подтверждение/фильтрацию по Open Interest.
      enable_cvd: false            # CVD отключён.
                                   # Это значит, что все CVD-пороги ниже сейчас фактически не участвуют в фильтрации.

      oi_interval: "5m"            # Интервал, с которого брать OI-данные.
      cvd_interval: "5m"           # Интервал, с которого брать CVD-данные.
                                   # Оставлен на будущее, даже если enable_cvd=false.

      buy_min_oi_delta: 0.0        # Для BUY: минимально допустимая дельта OI.
                                   # 0.0 = OI должен быть неотрицательным / не падать.
      buy_min_cvd_delta: 0.0       # Для BUY: минимально допустимая дельта CVD.
                                   # Сейчас не используется, потому что enable_cvd=false.
      sell_max_oi_delta: 0.0       # Для SELL: максимально допустимая дельта OI.
                                   # 0.0 = OI должен быть <= 0, то есть не расти.
      sell_max_cvd_delta: 0.0      # Для SELL: максимально допустимая дельта CVD.
                                   # Сейчас не используется, потому что enable_cvd=false.

      # ==========================================================
      # АНТИШУМ 1: STEPS (2-step)
      # ==========================================================

      require_2step_oi_cvd: true   # Legacy-ключ.
                                   # Если trend_method не задан, код может автоматически включить steps-фильтр.
                                   # У тебя trend_method уже задан явно, поэтому это скорее резерв для совместимости.

      confirm_trend_bars: 3        # Кол-во шагов в step-проверке.
                                   # 2 шага = 3 последние точки (t-2, t-1, t).
      trend_strict: true           # Строгий режим step-проверки:
                                   # BUY требует явного роста, SELL — явного снижения.

      oi_eps: 1000                 # Минимальный размер шага OI в steps-проверке.
                                   # Это мягкий фильтр. Для очень шумных данных можно повышать.
      cvd_eps: 0                   # Минимальный размер шага CVD в steps-проверке.
                                   # Сейчас не используется, потому что enable_cvd=false и trend_mode="oi".

      # ==========================================================
      # АНТИШУМ 2: SLOPE (регрессия)
      # ==========================================================

      trend_method: "steps"        # off|steps|slope|both
                                   # Сейчас включён только steps-фильтр.
                                   # Значит slope-пороги ниже сейчас НЕ работают.
                                   # Это нормальная стартовая настройка: она мягче и даёт больше сигналов.
      # trend_method: "both"       # Вариант для более жёсткой фильтрации: steps + slope вместе.

      trend_mode: "oi"             # none|oi|cvd|both
                                   # Сейчас тренд проверяется только по OI.
                                   # Это согласуется с enable_cvd=false.

      slope_bars: 3                # Сколько точек брать для slope-регрессии.
                                   # Будет использоваться только если trend_method = "slope" или "both".
      slope_strict: true           # Строгая логика slope-фильтра.

      # --- BUY slope-пороги ---
      # Сейчас не используются, потому что trend_method: "steps".
      buy_oi_slope_min_bps: 13.3   # Мин. наклон OI для BUY, в bps/бар по ln(OI)*10000.
      buy_cvd_slope_norm_min: 1.26 # Мин. нормализованный наклон CVD для BUY.
                                   # Не используется, пока enable_cvd=false или trend_mode!="cvd/both".

      # Нормально ~ p95 (закомментировано)
      # buy_oi_slope_min_bps: 13.3
      # buy_cvd_slope_norm_min: 1.26

      # Жёстко (закомментировано)
      # buy_oi_slope_min_bps: 20.0
      # buy_cvd_slope_norm_min: 2.0

      # --- SELL slope-пороги ---
      # Сейчас не используются, потому что trend_method: "steps".
      sell_oi_slope_max_bps: -13.95   # Для SELL наклон OI должен быть <= этого значения.
      sell_cvd_slope_norm_max: -1.85  # Для SELL наклон CVD должен быть <= этого значения.
                                      # Не используется, пока enable_cvd=false или trend_mode!="cvd/both".
      # Нормально (закомментировано)
      # sell_oi_slope_max_bps: -13.95
      # sell_cvd_slope_norm_max: -1.85

      # Жёстко (закомментировано)
      # sell_oi_slope_max_bps: -35.38
      # sell_cvd_slope_norm_max: -2.96

      # ==========================================================
      # FUNDING-ФИЛЬТР
      # ==========================================================

      enable_funding: true         # Включить фильтр по funding.
                                   # Это делает отбор заметно строже.
      buy_funding_max_pct: 0.0     # Для BUY funding должен быть <= 0.0, то есть отрицательный или нулевой.
                                   # Это логично для контртолповых BUY-сценариев, но уменьшает число сигналов.
      sell_funding_min_pct: 0.0    # Для SELL funding должен быть >= 0.0, то есть положительный или нулевой.
                                   # Для пампов/перегрева это логично.

      # ==========================================================
      # РИСК-МЕНЕДЖМЕНТ
      # ==========================================================

      stop_loss_pct: 2.0           # Стоп-лосс в процентах от точки входа.
      take_profit_pct: 6.0         # Тейк-профит в процентах от точки входа.
                                   # Соотношение TP/SL = 3 к 1 — в целом хорошее.

      # ==========================================================
      # ГРАФИКИ
      # ==========================================================

      enable_plots: true           # Сохранять графики по найденным сигналам.
      plots_dir: "artifacts/screener_plots"  # Папка для сохранения графиков.
      plot_lookback: 180           # Сколько свечей показывать слева от сигнала на графике.
      plot_lookforward: 30         # Сколько свечей показывать справа от сигнала на графике.
      keep_plots_days: 2           # Хранить графики не более N дней (по ТЗ: 2)

      # ==========================================================
      # TELEGRAM
      # ==========================================================

      telegram_enabled: true       # Включить отправку уведомлений в Telegram.
      telegram_timezone: "Europe/Moscow"  # Таймзона для форматирования времени в сообщениях.
      telegram_extras_enabled: true       # Добавлять расширенную информацию в Telegram-сообщения.
      telegram_max_friends: 5      # Максимум получателей/чатов из списка целей.

      telegram_send_text: true     # Отправлять текстовые сообщения.
      telegram_mode: "batch"       # Режим отправки текста: batch = пачками.
      telegram_max_signals: 50     # Максимум сигналов в одной текстовой отправке/серии.

      telegram_send_plots: true    # Отправлять графики в Telegram.
      telegram_plot_mode: "photo"  # Режим отправки графиков. photo = как изображения.
      telegram_max_plot_signals: 30  # Максимум графиков на отправку.
      telegram_send_plot_followup_text: true  # После фото не слать дополнительный текст.
                                               # Нормально, если не хочешь дублирования.

      # ==========================================================
      # DEBUG / ЛОГИ
      # ==========================================================

      debug: true                  # Включить подробные диагностические логи.
                                   # Для отладки хорошо, для постоянной работы можно потом выключить.
      debug_top: 20                # Сколько топ-кандидатов показывать в debug-логах.
