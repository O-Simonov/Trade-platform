# config/screener_oi.yaml
# ------------------------------------------------------------
# OI screener config
# Актуализировано по логам запуска:
# - 5m: сигналы умирают слишком рано на OI/volume/price
# - 15m: кандидаты доходят до volume, но часто режутся по price_ok
# - 1h: кандидаты доходят до конца, но режутся funding filter
#
# Цель этой версии:
# 1) получить первые стабильные BUY-сигналы,
# 2) не развалить качество полностью,
# 3) сделать конфиг понятным по каждой переменной.
# ------------------------------------------------------------

# Как часто перезапускать полный цикл скринера в минутах.
restart_interval_minutes: 1

screeners:
  - name: scr_oi_binance            # Имя скринера
    enabled: true                   # Включен ли этот скринер
    version: "0.5"                  # Версия конфигурации

    params:
      # ------------------------------------------------------
      # ОБЩИЕ ПАРАМЕТРЫ ИСТОЧНИКА И СИГНАЛОВ
      # ------------------------------------------------------

      exchange_id: 1                # ID биржи в твоей системе (Binance)
      intervals: ["5m", "15m", "1h"] # Какие таймфреймы сканировать

      min_price: 0.0000001          # Минимальная цена инструмента
      max_price: 1000               # Максимальная цена инструмента
      max_symbols: 0                # 0 = без ограничения по числу символов
      signal_mode: "both"           # Генерировать buy и sell сигналы

      # ------------------------------------------------------
      # ГЛОБАЛЬНЫЕ ДЕФОЛТЫ
      # Используются как базовые значения, если не переопределены
      # внутри per_interval_overrides.
      # ------------------------------------------------------

      min_base_quote_volume: 150000.0     # Минимальный средний объём в базе
      min_oi_value: 750000.0              # Минимальное абсолютное значение OI/OI value
      buy_min_oi_last_rise_pct: 0.7       # Минимальный рост OI на последнем участке для BUY
      max_oi_drawdown_from_peak_pct: 1.6  # Максимальная просадка OI от локального пика
      min_signal_score: 42.0              # Глобальный минимальный score для сигнала

      use_atr_normalization: true         # Использовать ATR-нормализацию цены
      atr_period: 14                      # Период ATR
      buy_price_rise_atr_mult: 0.25       # Мин. рост цены в ATR для BUY
      buy_price_max_rise_atr_mult: 2.4    # Макс. допустимый рост цены в ATR, чтобы не ловить перегрев

      base_minutes: 240                   # Длина базового окна в минутах
      trigger_minutes: 20                 # Длина trigger-окна в минутах

      # ------------------------------------------------------
      # ПЕРЕОПРЕДЕЛЕНИЯ ПО ТАЙМФРЕЙМАМ
      # Именно здесь основная калибровка.
      # ------------------------------------------------------

      per_interval_overrides:

        "5m":
          # БАЗА И ОКНО СИГНАЛА
          base_minutes: 240               # Базовое окно для оценки "тихой базы"
          trigger_minutes: 20             # Окно триггера для поиска импульса
          max_signal_age_minutes: 30      # Через сколько минут сигнал считается устаревшим
          plot_lookback_bars: 220         # Сколько свечей захватывать на график

          # ЛИКВИДНОСТЬ / OI
          min_base_quote_volume: 180000   # Минимальный объём в базе
          min_oi_value: 900000            # Минимальный OI value
          buy_min_oi_last_rise_pct: 0.5   # Смягчено: раньше 5m умирал слишком рано
          max_oi_drawdown_from_peak_pct: 1.7 # Разрешаем чуть большую просадку OI
          min_signal_score: 40.0          # Смягчён score для первых входов
          early_buy_min_signal_score: 35.0 # Порог для раннего BUY

          # ЛОГИКА BUY
          buy_allow_downtrend_base: true  # Разрешать базу даже с умеренным даунтрендом
          buy_require_volume_spike: true  # Для 5m spike всё ещё нужен
          buy_oi_rise_pct: 1.0            # Смягчённый порог общего роста OI
          oi_value_confirm_pct: 0.8       # Смягчено подтверждение OI value
          buy_volume_mult: 1.25           # Минимальный рост объёма против базы
          buy_volume_spike_mult: 2.0      # Порог volume spike
          buy_price_rise_pct: 0.3         # Смягчено подтверждение роста цены
          buy_price_max_rise_pct: 3.4     # Не брать слишком перегретые импульсы
          buy_min_green_candles: 1        # Достаточно 1 зелёной свечи
          buy_require_last_green: false   # Последняя свеча не обязана быть зелёной
          buy_price_rise_atr_mult: 0.10   # Смягчено ATR-подтверждение
          buy_price_max_rise_atr_mult: 2.4 # Верхняя граница роста в ATR

          # ЛОГИКА SELL
          sell_oi_drop_one_candle_pct: 1.5 # Падение OI за 1 свечу для SELL
          sell_oi_drop_window_pct: 1.8     # Падение OI по окну для SELL
          sell_price_drop_last_pct: 0.7    # Падение цены последней свечи
          sell_reversal_from_max_pct: 0.8  # Откат от локального максимума
          sell_volume_spike_mult: 1.8      # Всплеск объёма для SELL
          sell_volume_drop_ratio: 0.75     # Допустимое падение объёма в SELL-логике

        "15m":
          # БАЗА И ОКНО СИГНАЛА
          base_minutes: 720               # Более длинная база для 15m
          trigger_minutes: 60             # Окно триггера
          max_signal_age_minutes: 45      # Возраст сигнала
          plot_lookback_bars: 180         # История для графика

          # ЛИКВИДНОСТЬ / OI
          min_base_quote_volume: 220000   # Минимальный объём базы
          min_oi_value: 1100000           # Минимальный OI value
          buy_min_oi_last_rise_pct: 0.5   # Смягчено
          max_oi_drawdown_from_peak_pct: 1.7 # Смягчено
          min_signal_score: 40.0          # Опущен общий порог
          early_buy_min_signal_score: 35.0 # Опущен ранний порог

          # ЛОГИКА BUY
          # По логам 15m чаще всего резался на price_ok, а не на базе.
          buy_allow_downtrend_base: true   # Разрешаем слабый нисходящий фон в базе
          buy_require_volume_spike: false  # Убираем обязательный spike
          buy_oi_rise_pct: 1.0             # Смягчён OI trigger
          oi_value_confirm_pct: 0.8        # Смягчено подтверждение OI value
          buy_volume_mult: 1.00            # Достаточно объёма не хуже базы
          buy_volume_spike_mult: 1.40      # Более мягкий spike
          buy_price_rise_pct: 0.0          # Главное изменение: не требуем обязательный рост цены
          buy_price_max_rise_pct: 3.5      # Ограничиваем перегретые движения
          buy_min_green_candles: 1         # Достаточно 1 зелёной свечи
          buy_require_last_green: false    # Последняя свеча не обязательна зелёная
          buy_price_rise_atr_mult: 0.0     # Отключаем жёсткий ATR price-filter
          buy_price_max_rise_atr_mult: 2.5 # Ограничение от перегрева по ATR

          # ЛОГИКА SELL
          sell_oi_drop_one_candle_pct: 1.2
          sell_oi_drop_window_pct: 1.6
          sell_price_drop_last_pct: 0.7
          sell_reversal_from_max_pct: 0.8
          sell_volume_spike_mult: 1.5
          sell_volume_drop_ratio: 0.76

        "1h":
          # БАЗА И ОКНО СИГНАЛА
          base_minutes: 720                # База для 1h
          trigger_minutes: 120             # Окно триггера
          max_signal_age_minutes: 120      # Максимальный возраст сигнала
          plot_lookback_bars: 140          # История графика

          # ЛИКВИДНОСТЬ / OI
          min_base_quote_volume: 350000    # Минимальный объём
          min_oi_value: 1800000            # Минимальный OI value
          buy_min_oi_last_rise_pct: 0.5    # Смягчён порог роста OI
          max_oi_drawdown_from_peak_pct: 1.9 # Чуть шире допуск просадки
          min_signal_score: 39.0           # Снижен score
          early_buy_min_signal_score: 34.0 # Снижен ранний score

          # ЛОГИКА BUY
          # По логам 1h доходил до конца, но резался funding filter.
          buy_allow_downtrend_base: true
          buy_require_volume_spike: false
          buy_oi_rise_pct: 0.9             # Ещё мягче OI trigger
          oi_value_confirm_pct: 0.8
          buy_volume_mult: 1.00
          buy_volume_spike_mult: 1.30
          buy_price_rise_pct: 0.0          # Смягчено price-confirmation
          buy_price_max_rise_pct: 4.0
          buy_min_green_candles: 1
          buy_require_last_green: false
          buy_price_rise_atr_mult: 0.0     # Убираем жёсткий ATR-фильтр
          buy_price_max_rise_atr_mult: 2.3

          # ЛОГИКА SELL
          sell_oi_drop_one_candle_pct: 1.0
          sell_oi_drop_window_pct: 1.4
          sell_price_drop_last_pct: 0.6
          sell_reversal_from_max_pct: 0.7
          sell_volume_spike_mult: 1.4
          sell_volume_drop_ratio: 0.78

      # ------------------------------------------------------
      # ФИЛЬТР БАЗЫ
      # ------------------------------------------------------

      price_sideways_max_pct: 9.0          # Максимальный диапазон цены, считающийся "боковиком"
      price_downtrend_min_pct: 0.2         # Минимальная величина снижения, чтобы считать базу нисходящей

      # "Тихая база" по объёму:
      # если объём в базе слишком большой/шумный, сигнал не считается качественным.
      # По твоим логам общий лимит нужно держать мягче.
      base_volume_max_mult: 6.5            # Максимальный коэффициент объёма базы

      # ------------------------------------------------------
      # ГЛОБАЛЬНЫЕ BUY-ПАРАМЕТРЫ
      # Это дефолты, если таймфрейм не переопределил свои.
      # ------------------------------------------------------

      buy_min_green_candles: 2             # Минимум зелёных свечей для BUY
      buy_require_last_green: false        # Требовать ли, чтобы последняя свеча была зелёной

      enable_confirmed_buy: true           # Включить обычный подтверждённый BUY
      enable_early_buy: true               # Включить ранний BUY

      early_buy_min_green_candles: 1       # Минимум зелёных свечей для early BUY
      early_buy_require_last_green: false  # Для раннего BUY последняя свеча не обязательна зелёная
      early_buy_volume_mult_ratio: 0.80    # Доля от buy_volume_mult для early BUY
      early_buy_volume_spike_ratio: 0.75   # Доля от spike-порога для early BUY
      early_buy_price_rise_pct_ratio: 0.55 # Доля от price rise порога для early BUY
      early_buy_price_rise_atr_mult_ratio: 0.55 # Доля от ATR-порога для early BUY
      early_buy_min_signal_score: 38.0     # Глобальный минимальный score для early BUY

      # ------------------------------------------------------
      # КЛЮЧИ ДЛЯ OI
      # ------------------------------------------------------

      oi_calc_key: "open_interest"         # Поле, из которого считается OI динамика
      oi_plot_key: "open_interest_value"   # Поле, которое рисуется на графике

      # ------------------------------------------------------
      # FUNDING FILTER
      # ------------------------------------------------------

      enable_funding: true                 # Учитывать funding при BUY
      buy_funding_max_pct: 0.02            # Смягчено: раньше 1h резался на funding=0.013..0.031
      buy_require_funding_decreasing: false # Не требуем, чтобы funding обязательно снижался

      sell_enable_funding: true            # Учитывать funding в SELL-логике
      sell_funding_min_pct: 0.0            # Минимальный funding для SELL

      # ------------------------------------------------------
      # RISK MANAGEMENT
      # ------------------------------------------------------

      stop_loss_pct: 2.0                   # Стоп-лосс в процентах
      take_profit_pct: 6.0                 # Тейк-профит в процентах

      # ------------------------------------------------------
      # СРОК ЖИЗНИ СИГНАЛА
      # ------------------------------------------------------

      max_signal_age_minutes: 30           # Глобальный дефолт возраста сигнала

      # ------------------------------------------------------
      # ГРАФИКИ
      # ------------------------------------------------------

      plots_enabled: true                  # Сохранять графики по сигналам
      plots_dir: "artifacts/screener_plots" # Папка для графиков
      plot_lookback_bars: 220              # Глобальный дефолт глубины графика
      keep_plots_days: 2                   # Сколько дней хранить графики

      # ------------------------------------------------------
      # TELEGRAM
      # ------------------------------------------------------

      telegram_send_messages: true         # Отправлять сообщения в Telegram
      telegram_send_plots: true            # Отправлять графики в Telegram
      telegram_silent: false               # Отправка без звука

      telegram_extras_enabled: true        # Дополнительные блоки/оформление в Telegram
      telegram_max_friends: 5              # Сколько похожих/соседних тикеров показывать

      # ------------------------------------------------------
      # DEBUG
      # ------------------------------------------------------

      debug: true                          # Включить debug-логи
      debug_top: 20                        # Сколько top-кандидатов печатать в лог