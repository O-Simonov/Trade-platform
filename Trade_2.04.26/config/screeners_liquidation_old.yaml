restart_interval_minutes: 1  # Как часто перезапускать скринер (мин). Полный цикл: загрузка → расчёт → вставка сигналов/графики → сон.

screeners:
  - name: scr_liquidation_binance        # Имя скринера (должно совпадать с реестром в run_screeners_liquidation.py)
    enabled: true                        # Включить/выключить этот скринер
    version: "0.1"                       # Версия скринера (пишется в БД через ensure_screener)

    params:
      # ---------------------------
      # Базовые фильтры
      # ---------------------------
      intervals: ["5m"]     # Таймфреймы, которые скринер анализирует (для каждого будет отдельный прогон)
      min_price: 0.00000001              # Отсечь слишком дешёвые монеты (фильтр по текущей цене)
      max_price: 1000                    # Отсечь слишком дорогие монеты (фильтр по текущей цене)

      # Мин. объём ликвидаций в anchor-свече (USDT). Маппинг по intervals:
      #   5m→20000, 15m→30000, 1h→50000
      # Если не проходит — сигнал по символу игнорируется.
      volume_liquid_limit: [20000]

      # Требуемое доминирование ликвидаций в %:
      #   SELL: short_liq >= long_liq * (1 + pct/100)
      #   BUY : long_liq  >= short_liq * (1 + pct/100)
      liq_dominance_pct: 70.0

      # ==========================================================
      # ✅ RISK / POSITION SIZE
      # ==========================================================
      risk_trade_pct: 2.0                 # Риск на сделку в % от equity (например 1.0 = 1% от капитала)
      risk_equity_usdt: 1000              # Equity в USDT для расчёта риска; null => брать equity из БД
      risk_account_id: 1                  # account_id, из которого читать equity в БД (если risk_equity_usdt=null)

      # ==========================================================
      # ✅ STOP LOSS / TAKE PROFIT (ТОЛЬКО %)
      # ==========================================================
      stop_loss_pct: 2.0                  # SL в % от entry (например 2.0 = 2%)
      take_profit_mode: "pct"             # Режим TP (в проекте оставлен только percent-режим)
      take_profit_pct: 5.0                # TP в % от entry (например 6.0 = 6%)

      # Откуда брать цену входа (entry):
      #   "current"       -> текущая цена (ticker_24h.last_price, fallback close)
      #   "anchor_close"  -> close anchor-свечи (с крупной ликвидацией)
      #   "confirm_close" -> close свечи подтверждения (консервативный entry)
      entry_price_mode: "confirm_close"
      # ---------------------------
      # Уровни / Логика
      # ---------------------------
      period_levels: 600                  # Сколько свечей брать для поиска уровней S/R
      pivot_left: 4
      pivot_right: 4
      level_cluster_tol_pct: 0.003        # 0.003=0.3%: близкие уровни объединяются
      max_level_candidates: 14
      min_level_cluster_strength: 2      # Берём только уровни с кластером не слабее этого значения
      allow_fallback_levels: false       # false => fallback-уровни не используются для сигналов
      level_tol_pct: 0.005               # Допуск касания уровня (±0.5%)

      # ==========================================================
      # ✅ TOUCH / CROSS
      # ==========================================================
      touch_lookback_candles: 3           # Сколько последних свечей проверять на касание/пробой уровня
      touch_mode: "touch_or_cross"        # "touch" | "cross" | "touch_or_cross"

      # ==========================================================
      # ✅ CONFIRMATION
      # ==========================================================
      confirm_lookforward: 3              # Fallback: сколько свечей после anchor смотреть подтверждение направления
      confirm_body_min_pct: 35            # Минимальный body confirm-candle как % от её range
      confirm_close_vs_anchor_mid: true   # BUY: close confirm выше mid anchor; SELL: ниже mid anchor

      anchor_wick_to_range_min_pct: 35    # Минимальная доля фитиля anchor от полного range
      anchor_wick_to_body_min: 1.2        # Фитиль anchor должен быть как минимум в 1.2x больше тела
      anchor_close_recovery_min_pct: 45   # Насколько далеко close anchor должен уйти от экстремума
      anchor_to_level_max_pct: 0.35       # Anchor high/low должен быть близко к уровню
      followthrough_max_pct: 0.20         # После liquidation не допускаем сильного продолжения импульса
      followthrough_check_candles: 1      # Проверяем ближайшую свечу после anchor

      confirm_lookforward_map:            # per-TF: confirm_lookforward
        "5m": 3
      # ==========================================================
      # ✅ Фильтр всплеска объёма в последних touch_lookback_candles
      # ==========================================================
      volume_avg_window: 240              # Окно ДО anchor для расчёта avg_volume

      # Требуемый коэффициент всплеска объёма в последних touch_lookback_candles:
      # recent_volume_peak >= avg_volume * K
      # 0 или <=0 => отключить объёмный фильтр для этого TF.
      volume_spike_k: [3.0]
      liq_relative_window: 24             # Окно истории по ликвидациям для относительного фильтра
      liq_relative_k: 1.8                 # Anchor liquidation должен быть >= avg_history * K

      # ==========================================================
      # ✅ СВЕЖЕСТЬ СИГНАЛОВ (отбрасываем старые)
      # ==========================================================
      fresh_signal_minutes: 30            # Fallback: порог свежести (мин). 0/<=0 => отключить

      fresh_signal_minutes_map:
        "5m": 20

      level_reaction_lookahead: 4         # Сколько свечей после касания уровня смотреть реакцию зоны
      level_reaction_min_pct: 0.30        # Минимальная реакция от уровня, чтобы учитывать touch как качественный
      level_zone_extra_tol_pct: 0.002     # Дополнительная ширина зоны вокруг найденного уровня
      acceptance_bins: 28                 # Бины для упрощённых acceptance / profile-уровней
      require_htf_level_overlap: true     # Локальный уровень должен подтверждаться старшим ТФ
      htf_level_interval: "15m"
      htf_level_tol_pct: 0.0035

      max_anchor_candidates: 3            # Рассматриваем несколько последних anchor-кандидатов и берём лучший
      trend_ema_span: 34                  # Простой фильтр перерастяжения цены относительно EMA
      trend_extension_max_pct: 4.0

      # Примечание: свежесть считается по close-time: signal_ts + длительность интервала.
      # ---------------------------
      # Funding (опционально)
      # ---------------------------
      enable_funding: true
      kof_fund: 0.001                     # Порог funding (в %). 0.001% => 0.00001 (доля)
      # ---------------------------
      # ✅ Графики
      # ---------------------------
      enable_plots: true
      plots_dir: "artifacts/screener_plots"
      plots_keep_days: 2
      plots_cleanup_every_minutes: 60
      plot_lookback: 120
      plot_lookforward: 40
      plot_max_signals: 50                # Максимум графиков за прогон

      # ---------------------------
      # Дебаг
      # ---------------------------
      debug: true
      debug_top: 10

      # ✅ TELEGRAM
      telegram_enabled: true
      telegram_timezone: "Europe/Moscow"
      telegram_extras_enabled: true
      telegram_max_friends: 5

      telegram_send_text: true
      telegram_send_plots: true
      telegram_plot_mode: "photo"         # "photo" | "document"
      telegram_max_plot_signals: 50
      telegram_send_plot_followup_text: true
